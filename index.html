            : `<div style="display:flex;flex-direction:column;align-items:center;gap:8px"><svg width="22" height="22" fill="none" stroke="#444" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span style="color:#555;font-size:12px">Klik upload foto KTP</span><span style="color:#333;font-size:10px">JPG, PNG — max 5MB</span></div>`}
        </div>
        <input type="file" id="ktp-file" accept="image/*" style="display:none" onchange="sellerUploadKTP(this)"/>
        <div id="ktp-status" style="font-size:11px;color:var(--dim);margin-top:4px"></div>
      </div>
      ${fld('','No. Rekening Bank *',inp('s-bank','text','Contoh: BCA - 1234567890 - Budi Santoso',window._sellerData.bank_account||''),'Untuk pencairan komisi penjualan')}
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="renderSellerStep(0)" style="flex:1">← Kembali</button>
      <button class="btn btn-gold" onclick="sellerNext(1)" style="flex:2">Lanjut: Alamat →</button>
    </div>`

  } else if(step===2) { area.innerHTML=`
    <div class="profile-card" style="margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:4px">📍 Alamat Toko</div>
      <div style="font-size:11px;color:#555;margin-bottom:20px">Publik hanya melihat Kota/Provinsi kamu</div>
      ${fld('','Pulau *',sel('s-pulau',`<option value="">Pilih Pulau...</option>${PULAU.map(p=>`<option value="${p}" ${window._sellerData.pulau===p?'selected':''}>${p}</option>`).join('')}`,'sellerChangePulau(this.value)'))}
      ${fld('','Provinsi *',sel('s-prov',`<option value="">Pilih Provinsi...</option>${window._sellerData.pulau?(PROVINSI[window._sellerData.pulau]||[]).map(p=>`<option value="${p}" ${window._sellerData.provinsi===p?'selected':''}>${p}</option>`).join(''):''}`,'sellerChangeProv(this.value)'))}
      ${fld('','Kabupaten / Kota *',sel('s-kab',`<option value="">Pilih Kab/Kota...</option>${window._sellerData.provinsi?getKabKota(window._sellerData.provinsi).map(k=>`<option value="${k}" ${window._sellerData.kab_kota===k?'selected':''}>${k}</option>`).join(''):''}`,'sellerChangeKab(this.value)'))}
      ${fld('','Kecamatan *',sel('s-kec',`<option value="">Pilih Kecamatan...</option>${window._sellerData.kab_kota?getKecamatan(window._sellerData.kab_kota).map(k=>`<option value="${k}" ${window._sellerData.kecamatan===k?'selected':''}>${k}</option>`).join(''):''}`))}
      ${fld('','Kelurahan / Desa *',inp('s-kel','text','Nama kelurahan/desa',window._sellerData.kelurahan||''))}
      ${fld('','Kode Pos *',`<input id="s-kodepos" type="text" placeholder="Contoh: 16912" value="${esc(window._sellerData.kode_pos||'')}" maxlength="5" style="width:100%;background:#111;border:1px solid var(--border2);color:#fff;border-radius:12px;padding:12px 14px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>`)}
      ${fld('','Alamat Lengkap *',`<textarea id="s-alamat" rows="3" maxlength="300" placeholder="Jl. Nama Jalan No. XX, RT/RW..." style="width:100%;background:#111;border:1px solid var(--border2);color:#fff;border-radius:12px;padding:12px 14px;font-size:13px;outline:none;font-family:inherit;resize:vertical">${esc(window._sellerData.alamat_lengkap||'')}</textarea>`)}
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="renderSellerStep(1)" style="flex:1">← Kembali</button>
      <button class="btn btn-gold" onclick="sellerNext(2)" style="flex:2">Lanjut: Verifikasi →</button>
    </div>`

  } else if(step===3) {
    const d = window._sellerData
    area.innerHTML=`
    <div class="profile-card" style="margin-bottom:16px">
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:20px">📧 Verifikasi Email</div>
      <div style="background:#0d0d0d;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px">
        <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">Ringkasan Pendaftaran</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px">
          ${[['Nama Toko',d.shop_name],['Kategori',d.shop_category],['Nama KTP',d.full_name],['Provinsi',d.provinsi],['Kab/Kota',d.kab_kota],['Kecamatan',d.kecamatan]].map(([k,v])=>`<div><div style="color:#444;font-size:10px">${k}</div><div style="color:#ccc;font-weight:600;margin-top:1px">${esc(v||'-')}</div></div>`).join('')}
        </div>
      </div>
      <div style="background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.15);border-radius:12px;padding:14px;margin-bottom:18px">
        <p style="font-size:12px;color:#888;line-height:1.6">📧 Kode verifikasi 6 digit akan dikirim ke <strong style="color:#fff">${esc(STATE.user?.email||'')}</strong>. Masukkan kode untuk menyelesaikan pendaftaran.</p>
      </div>
      <div id="otp-send-area">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:14px">
          <input type="checkbox" id="s-agree" style="width:14px;height:14px;accent-color:var(--gold);cursor:pointer;margin-top:2px;flex-shrink:0"/>
          <label for="s-agree" style="font-size:12px;color:#888;cursor:pointer;line-height:1.5">Saya menyetujui <button onclick="navigate('about')" style="color:var(--gold);background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;text-decoration:underline">Syarat & Ketentuan</button> XREZZKY dan menyatakan seluruh data yang diisi adalah benar dan dapat dipertanggungjawabkan secara hukum.</label>
        </div>
        <button class="btn btn-gold btn-full" id="send-otp-btn" onclick="sellerSendOTP()">Kirim Kode Verifikasi ke Email</button>
      </div>
      <div id="otp-input-area" style="display:none">
        <div style="font-size:13px;color:#888;margin-bottom:16px;text-align:center">Masukkan kode 6 digit yang dikirim ke email kamu:</div>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">
          ${Array.from({length:6}).map((_,i)=>`<input type="text" maxlength="1" id="otp-${i}" style="width:44px;height:52px;background:#111;border:2px solid #2a2a2a;color:#fff;border-radius:12px;text-align:center;font-size:22px;font-weight:800;font-family:'Syne',sans-serif;outline:none;transition:all .2s" oninput="otpIn(${i},this)" onkeydown="otpKD(${i},event)" onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='#2a2a2a'"/>`).join('')}
        </div>
        <button class="btn btn-gold btn-full" id="verify-btn" onclick="sellerVerify()">Verifikasi & Daftar Seller ✦</button>
        <div style="text-align:center;margin-top:12px">
          <span style="font-size:12px;color:#555" id="cd-wrap">Kirim ulang dalam <span id="cd-sec">60</span>s</span>
          <button id="resend-btn" onclick="sellerSendOTP()" style="display:none;font-size:12px;color:var(--gold);background:none;border:none;cursor:pointer;font-family:inherit">Kirim ulang kode</button>
        </div>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="renderSellerStep(2)" style="width:100%">← Kembali</button>`
  }
}

function sellerChangePulau(val) {
  window._sellerData.pulau=val; window._sellerData.provinsi=''; window._sellerData.kab_kota=''; window._sellerData.kecamatan=''
  const ps=q('s-prov'); if(ps) ps.innerHTML=`<option value="">Pilih Provinsi...</option>${(PROVINSI[val]||[]).map(p=>`<option value="${p}">${p}</option>`).join('')}`
  const ks=q('s-kab'); if(ks) ks.innerHTML=`<option value="">Pilih Kab/Kota...</option>`
  const kcs=q('s-kec'); if(kcs) kcs.innerHTML=`<option value="">Pilih Kecamatan...</option>`
}
function sellerChangeProv(val) {
  window._sellerData.provinsi=val; window._sellerData.kab_kota=''; window._sellerData.kecamatan=''
  const ks=q('s-kab'); if(ks) ks.innerHTML=`<option value="">Pilih Kab/Kota...</option>${getKabKota(val).map(k=>`<option value="${k}">${k}</option>`).join('')}`
  const kcs=q('s-kec'); if(kcs) kcs.innerHTML=`<option value="">Pilih Kecamatan...</option>`
}
function sellerChangeKab(val) {
  window._sellerData.kab_kota=val; window._sellerData.kecamatan=''
  const kcs=q('s-kec'); if(kcs) kcs.innerHTML=`<option value="">Pilih Kecamatan...</option>${getKecamatan(val).map(k=>`<option value="${k}">${k}</option>`).join('')}`
}

async function sellerUploadKTP(input) {
  const file=input.files[0]; if(!file) return
  if(file.size>5*1024*1024) { showToast('File max 5MB','error'); return }
  const st=q('ktp-status'), area=q('ktp-area')
  if(st) st.innerHTML=`<div style="display:flex;align-items:center;gap:6px"><div class="spin" style="width:12px;height:12px"></div>Mengupload...</div>`
  try {
    const url=await uploadToCloudinary(file)
    window._sellerData.ktp_url=url
    if(area) { area.style.borderColor='#22c55e'; area.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><svg width="20" height="20" fill="none" stroke="#22c55e" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span style="color:#22c55e;font-size:12px;font-weight:600">Foto KTP terupload ✓</span><span style="color:#555;font-size:10px">Klik untuk ganti</span></div>` }
    if(st) st.innerHTML=''
    showToast('Foto KTP berhasil diupload! ✅')
  } catch(err) {
    if(st) st.innerHTML=`<span style="color:#f87171">Gagal: ${esc(err.message)}</span>`
    showToast('Gagal upload: '+err.message,'error')
  }
}

function sellerNext(step) {
  const errEl=q('seller-err'); if(errEl) errEl.innerHTML=''
  const err=(msg)=>{ if(errEl){errEl.innerHTML=`<div class="err-box"><p>${msg}</p></div>`; errEl.scrollIntoView({behavior:'smooth',block:'center'})} }
  if(step===0) {
    const name=q('s-name')?.value.trim(), desc=q('s-desc')?.value.trim(), cat=q('s-cat')?.value, wa=q('s-wa')?.value.trim()
    if(!name||name.length<3) return err('Nama toko minimal 3 karakter.')
    if(!desc||desc.length<20) return err('Deskripsi minimal 20 karakter.')
    if(!cat) return err('Pilih kategori toko.')
    if(!wa||wa.length<9) return err('Nomor WhatsApp tidak valid.')
    Object.assign(window._sellerData,{shop_name:name,shop_desc:desc,shop_category:cat,shop_wa:wa})
    renderSellerStep(1)
  } else if(step===1) {
    const fn=q('s-fullname')?.value.trim(), nik=q('s-nik')?.value.trim(), dob=q('s-dob')?.value, gen=q('s-gender')?.value, bank=q('s-bank')?.value.trim()
    if(!fn||fn.length<3) return err('Nama lengkap wajib diisi.')
    if(!nik||nik.length!==16) return err('NIK harus 16 digit.')
    if(!dob) return err('Tanggal lahir wajib diisi.')
    if(!gen) return err('Jenis kelamin wajib dipilih.')
    if(!window._sellerData.ktp_url) return err('Foto KTP wajib diupload.')
    if(!bank||bank.length<10) return err('Info rekening bank wajib diisi.')
    Object.assign(window._sellerData,{full_name:fn,nik,dob,gender:gen,bank_account:bank})
    renderSellerStep(2)
  } else if(step===2) {
    const pulau=q('s-pulau')?.value, prov=q('s-prov')?.value, kab=q('s-kab')?.value, kec=q('s-kec')?.value, kel=q('s-kel')?.value.trim(), kp=q('s-kodepos')?.value.trim(), al=q('s-alamat')?.value.trim()
    if(!pulau) return err('Pilih pulau.')
    if(!prov) return err('Pilih provinsi.')
    if(!kab) return err('Pilih kabupaten/kota.')
    if(!kec) return err('Pilih kecamatan.')
    if(!kel) return err('Kelurahan/desa wajib diisi.')
    if(!kp||kp.length!==5) return err('Kode pos harus 5 digit.')
    if(!al||al.length<10) return err('Alamat lengkap wajib diisi.')
    Object.assign(window._sellerData,{pulau,provinsi:prov,kab_kota:kab,kecamatan:kec,kelurahan:kel,kode_pos:kp,alamat_lengkap:al})
    renderSellerStep(3)
  }
}

function otpIn(i,el) {
  el.value=el.value.replace(/[^0-9]/g,'')
  if(el.value&&i<5) q(`otp-${i+1}`)?.focus()
}
function otpKD(i,e) {
  if(e.key==='Backspace'&&!e.target.value&&i>0) q(`otp-${i-1}`)?.focus()
  if(e.key==='ArrowLeft'&&i>0) q(`otp-${i-1}`)?.focus()
  if(e.key==='ArrowRight'&&i<5) q(`otp-${i+1}`)?.focus()
}

async function sellerSendOTP() {
  if(!q('s-agree')?.checked) { showToast('Centang persetujuan syarat & ketentuan dahulu.','error'); return }
  const btn=q('send-otp-btn'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  const otp=String(Math.floor(100000+Math.random()*900000))
  const exp=new Date(Date.now()+10*60*1000).toISOString()
  const {error}=await sb.from('seller_otps').upsert({user_id:STATE.user.id,otp_code:otp,expires_at:exp},{onConflict:'user_id'})
  if(error){showToast('Gagal mengirim OTP: '+error.message,'error');if(btn){btn.innerHTML='Kirim Kode Verifikasi ke Email';btn.disabled=false};return}
  // DEV: tampilkan OTP di console — HAPUS DI PRODUKSI, ganti dengan edge function kirim email
  console.warn('🔑 DEV OTP (hapus di produksi):', otp)
  showToast(`Kode OTP dikirim ke ${STATE.user.email}`)
  const send=q('otp-send-area'), inp2=q('otp-input-area')
  if(send) send.style.display='none'
  if(inp2) inp2.style.display='block'
  q('otp-0')?.focus()
  let sec=60
  clearInterval(window._otpCd)
  window._otpCd=setInterval(()=>{
    sec--; const t=q('cd-sec'); if(t) t.textContent=sec
    if(sec<=0){clearInterval(window._otpCd);const w=q('cd-wrap'),rb=q('resend-btn');if(w)w.style.display='none';if(rb)rb.style.display='inline'}
  },1000)
}

async function sellerVerify() {
  const code=Array.from({length:6}).map((_,i)=>q(`otp-${i}`)?.value||'').join('')
  if(code.length!==6){showToast('Masukkan 6 digit kode OTP.','error');return}
  const btn=q('verify-btn'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  const {data:od,error:oe}=await sb.from('seller_otps').select('otp_code,expires_at').eq('user_id',STATE.user.id).single()
  if(oe||!od){showToast('Kode tidak valid.','error');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return}
  if(od.otp_code!==code){
    Array.from({length:6}).forEach((_,i)=>{const el=q(`otp-${i}`);if(el)el.style.borderColor='#ef4444'})
    showToast('Kode OTP salah.','error');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return
  }
  if(new Date(od.expires_at)<new Date()){showToast('Kode OTP kadaluarsa.','error');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return}
  const d=window._sellerData
  const {error:se}=await sb.from('seller_applications').insert({
    user_id:STATE.user.id,email:STATE.user.email,
    shop_name:d.shop_name,shop_description:d.shop_desc,shop_category:d.shop_category,shop_whatsapp:'+62'+d.shop_wa,
    full_name:d.full_name,nik:d.nik,date_of_birth:d.dob,gender:d.gender,ktp_url:d.ktp_url,bank_account:d.bank_account,
    pulau:d.pulau,provinsi:d.provinsi,kab_kota:d.kab_kota,kecamatan:d.kecamatan,kelurahan:d.kelurahan,kode_pos:d.kode_pos,alamat_lengkap:d.alamat_lengkap,
    status:'pending'
  })
  if(se){showToast('Gagal submit: '+se.message,'error');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return}
  await sb.from('seller_otps').delete().eq('user_id',STATE.user.id)
  clearInterval(window._otpCd)
  updateSellerStepUI(4)
  const area=q('seller-form-area')
  if(area) area.innerHTML=`
    <div style="text-align:center;padding:48px 20px">
      <div style="width:72px;height:72px;background:rgba(34,197,94,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid rgba(34,197,94,.3)">
        <svg width="32" height="32" fill="none" stroke="#22c55e" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;margin-bottom:10px">Pendaftaran Terkirim! 🎉</div>
      <p style="font-size:13px;color:#666;line-height:1.7;margin-bottom:8px;max-width:380px;margin-left:auto;margin-right:auto">Admin akan meninjau dalam <strong style="color:#fff">1-3 hari kerja</strong>.</p>
      <p style="font-size:12px;color:#555;margin-bottom:28px">Notifikasi akan dikirim ke <strong style="color:var(--gold)">${esc(STATE.user.email)}</strong>.</p>
      <button class="btn btn-gold" onclick="navigate('profile')">Kembali ke Profil</button>
    </div>`
  showToast('Pendaftaran berhasil dikirim! ✅')
}

// ── REALTIME CART ─────────────────────────────────────────
function startCartRealtime() {
  if(window._cartChannel) sb.removeChannel(window._cartChannel)
  if(!STATE.user) return
  window._cartChannel = sb.channel('cart-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'carts',filter:`user_id=eq.${STATE.user.id}`},
      async()=>{ await loadCartCount() })
    .subscribe()
}

// ── INIT ──────────────────────────────────────────────────
;(async()=>{
  await initAuth()
  if(STATE.user) startCartRealtime()
  renderHome()
  injectFooter('home')

  // sb auth listener untuk start realtime setelah login
  sb.auth.onAuthStateChange((ev)=>{
    if(ev==='SIGNED_IN') startCartRealtime()
    else if(ev==='SIGNED_OUT') {
      if(window._cartChannel) sb.removeChannel(window._cartChannel)
    }
  })
})()
