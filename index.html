<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>XREZZKY Official Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gold:#f5a623;--gold2:#e09515;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#151515;
  --border:#1a1a1a;--border2:#222;
  --text:#fff;--muted:#555;--dim:#333;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3,.brand{font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── LAYOUT ── */
.page{display:none;min-height:100vh}
.page.active{display:block}
.container{max-width:1200px;margin:0 auto;padding:0 16px}

/* ── NAVBAR ── */
#navbar{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid transparent;transition:border-color .3s
}
#navbar.scrolled{border-color:var(--border)}
.nav-inner{display:flex;align-items:center;height:60px;gap:12px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:14px;font-family:'Syne',sans-serif}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0.15em;font-size:13px;text-transform:uppercase}
.nav-links{display:flex;gap:4px;margin-left:16px}
.nav-link{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;text-decoration:none}
.nav-link:hover,.nav-link.active{color:#fff;background:var(--bg3)}
.nav-link.active{color:var(--gold);background:rgba(245,166,35,.1)}
.nav-search{flex:1;max-width:300px;position:relative;margin-left:auto}
.nav-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:#fff;border-radius:10px;padding:7px 36px 7px 14px;font-size:13px;outline:none;transition:border-color .2s}
.nav-search input:focus{border-color:rgba(245,166,35,.5)}
.nav-search input::placeholder{color:var(--dim)}
.nav-search button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);background:none;border:none;cursor:pointer;display:flex}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:8px}
.cart-btn{position:relative;padding:8px;color:var(--muted);border-radius:10px;transition:all .2s;display:flex}
.cart-btn:hover{color:#fff;background:var(--bg3)}
.cart-badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--gold);color:#000;font-size:9px;font-weight:900;border-radius:50%;display:flex;align-items:center;justify-content:center}
.user-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:10px;cursor:pointer;transition:all .2s}
.user-btn:hover{background:var(--bg3)}
.avatar{width:28px;height:28px;border-radius:8px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--gold);overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.chevron{transition:transform .2s;color:var(--dim)}
.dropdown{position:absolute;right:0;top:calc(100% + 8px);width:210px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:200}
.drop-info{padding:12px 16px;border-bottom:1px solid var(--border)}
.drop-info .name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-info .email{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-balance{padding:10px 16px;border-bottom:1px solid var(--border)}
.drop-balance .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.drop-balance .val{font-size:14px;font-weight:800;color:var(--gold);font-family:'Syne',sans-serif}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:#888;transition:all .2s;cursor:pointer}
.drop-item:hover{color:#fff;background:var(--bg3)}
.drop-item.danger{color:#ef4444}
.drop-item.danger:hover{background:rgba(239,68,68,.1)}
.role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.role-admin{background:rgba(168,85,247,.15);color:#a855f7}
.role-seller{background:rgba(59,130,246,.15);color:#3b82f6}
.role-buyer{background:rgba(245,166,35,.15);color:var(--gold)}
.hamburger{display:none;padding:8px;color:var(--muted);border-radius:10px;transition:all .2s}
.hamburger:hover{color:#fff;background:var(--bg3)}
.mobile-menu{display:none;border-top:1px solid var(--border);padding:12px;gap:4px;flex-direction:column}
.mobile-menu.open{display:flex}
.m-link{display:block;padding:10px 12px;border-radius:10px;font-size:13px;color:var(--muted);transition:all .2s}
.m-link:hover,.m-link.active{color:#fff;background:var(--bg3)}
.m-search{position:relative;margin-bottom:4px}
.m-search input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:#fff;border-radius:10px;padding:10px 36px 10px 12px;font-size:13px;outline:none}
.m-search input::placeholder{color:var(--dim)}
.m-search button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);z-index:9999;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{background:var(--bg2);border:1px solid rgba(245,166,35,.3);color:#fff}
#toast.error{background:#1a0000;border:1px solid rgba(239,68,68,.4);color:#f87171}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal-box{transform:translateY(0)}
@media(min-width:600px){.modal-overlay{align-items:center}.modal-box{border-radius:20px;max-width:480px}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2)}
.modal-head h3{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.close-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);transition:all .2s}
.close-btn:hover{color:#fff;background:var(--bg3)}
.modal-body{padding:20px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:all .2s;cursor:pointer;border:none;font-family:'Syne',sans-serif}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(245,166,35,.4)}
.btn-outline:hover{background:rgba(245,166,35,.08)}
.btn-ghost{background:var(--bg3);color:#888;border:1px solid var(--border2)}
.btn-ghost:hover{color:#fff;border-color:var(--border2)}
.btn-danger{background:transparent;color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-full{width:100%}
.btn-sm{padding:7px 14px;font-size:11px;border-radius:9px}
.btn-green{background:#16a34a;color:#fff}
.btn-green:hover{background:#15803d}
.btn-green:disabled{opacity:.5}
.spin{width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spin-light{border-color:rgba(255,255,255,.2);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FORMS ── */
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:#111;border:1px solid var(--border2);color:#fff;border-radius:12px;padding:12px 14px;font-size:13px;outline:none;transition:border-color .2s}
.field input::placeholder,.field textarea::placeholder{color:var(--dim)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field select{cursor:pointer;-webkit-appearance:none}
.field input.pass{padding-right:44px}
.pass-wrap{position:relative}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--dim);transition:color .2s;display:flex}
.eye-btn:hover{color:#888}
.field-error{font-size:11px;color:#f87171;margin-top:4px}
.strength-bar{display:flex;gap:3px;margin-top:6px}
.strength-bar div{height:3px;flex:1;border-radius:2px;background:var(--border2);transition:background .3s}
.strength-label{font-size:11px;margin-top:3px}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px}
.card-body{padding:16px}

/* ── PRODUCT GRID ── */
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:500px){.product-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.product-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:400px){.product-grid{grid-template-columns:1fr;gap:10px}}

.product-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  position:relative;
  cursor:pointer;
}
.product-card:hover{
  border-color:rgba(245,166,35,.35);
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,.4),0 0 0 1px rgba(245,166,35,.1);
}
.product-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,166,35,.03) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:1;border-radius:20px;
}
.product-card:hover::before{opacity:1}

.product-img{
  aspect-ratio:1;background:#0d0d0d;overflow:hidden;position:relative;
}
.product-img img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
}
.product-card:hover .product-img img{transform:scale(1.08)}
.product-img .no-img{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#1e1e1e;
  background:linear-gradient(135deg,#0f0f0f,#111);
}
.product-img .out-badge{
  position:absolute;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
.product-img .cat-badge{
  position:absolute;top:8px;left:8px;
  background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  color:#888;font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:20px;letter-spacing:.05em;
  border:1px solid rgba(255,255,255,.06);
}
.product-img .new-badge{
  position:absolute;top:8px;right:8px;
  background:var(--gold);color:#000;
  font-size:8px;font-weight:900;
  padding:3px 7px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;
}
.product-info{padding:12px;flex:1;display:flex;flex-direction:column;gap:4px;position:relative;z-index:2}
.product-name{
  font-size:13px;font-weight:600;color:#fff;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .2s;
}
.product-card:hover .product-name{color:var(--gold)}
.product-seller{
  font-size:10px;color:var(--dim);
  display:flex;align-items:center;gap:4px;
}
.seller-verified{color:var(--gold);font-size:9px}
.product-price{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  color:var(--gold);margin-top:auto;padding-top:6px;
}
.product-stock{font-size:10px;color:var(--dim);margin-bottom:6px}
.product-stock.out{color:#ef4444}

.add-cart-btn{
  width:100%;padding:9px;border-radius:12px;
  background:rgba(245,166,35,.12);color:var(--gold);
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  transition:all .25s;border:1px solid rgba(245,166,35,.2);
  cursor:pointer;font-family:'Syne',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-cart-btn:hover{background:var(--gold);color:#000;border-color:var(--gold)}
.add-cart-btn:active{transform:scale(.97)}
.add-cart-btn:disabled{
  background:#111;color:#333;border-color:#1a1a1a;cursor:not-allowed;transform:none;
}
.add-cart-btn.adding{background:rgba(245,166,35,.08);cursor:wait}

/* ripple effect */
.ripple{position:relative;overflow:hidden}
.ripple::after{
  content:'';position:absolute;border-radius:50%;
  background:rgba(245,166,35,.3);
  width:0;height:0;top:50%;left:50%;transform:translate(-50%,-50%);
  transition:width .4s,height .4s,opacity .4s;opacity:1;pointer-events:none;
}
.ripple:active::after{width:200px;height:200px;opacity:0}

/* ── CHIP / FILTER ── */
.chip{
  padding:7px 16px;border-radius:20px;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;border:1px solid var(--border2);
  background:var(--bg3);color:#555;white-space:nowrap;
  font-family:'DM Sans',sans-serif;letter-spacing:.03em;
}
.chip:hover{color:#fff;border-color:#333}
.chip.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}

/* ── SKELETON ── */
.skel{
  background:linear-gradient(90deg,#111 25%,#161616 50%,#111 75%);
  background-size:200% 100%;animation:skel 1.8s ease-in-out infinite;
  border-radius:8px;
}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.product-grid .product-card{animation:fadeUp .4s ease both}
.product-grid .product-card:nth-child(1){animation-delay:.05s}
.product-grid .product-card:nth-child(2){animation-delay:.1s}
.product-grid .product-card:nth-child(3){animation-delay:.15s}
.product-grid .product-card:nth-child(4){animation-delay:.2s}
.product-grid .product-card:nth-child(5){animation-delay:.05s}
.product-grid .product-card:nth-child(6){animation-delay:.1s}
.product-grid .product-card:nth-child(7){animation-delay:.15s}
.product-grid .product-card:nth-child(8){animation-delay:.2s}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;padding:70px 0 50px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(245,166,35,.04) 0%,transparent 60%),linear-gradient(160deg,#0d0d0d 0%,var(--bg) 100%)}
.hero-glow{position:absolute;top:-80px;right:-80px;width:600px;height:600px;background:var(--gold);opacity:.035;border-radius:50%;filter:blur(120px)}
.hero-glow2{position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;background:#3b82f6;opacity:.02;border-radius:50%;filter:blur(100px)}
.hero-content{position:relative;z-index:1;max-width:640px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:20px;padding:5px 14px;margin-bottom:20px}
.hero-badge .dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-badge span{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(30px,5vw,54px);font-weight:800;line-height:1.05;margin-bottom:14px}
.hero h1 em{font-style:normal;color:var(--gold);position:relative}
.hero p{color:#666;font-size:15px;line-height:1.7;margin-bottom:28px;max-width:420px}
.hero-btns{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:40px}
.stats{display:flex;gap:28px;flex-wrap:wrap}
.stat-item{position:relative;padding-left:12px}
.stat-item::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--gold);opacity:.4;border-radius:2px}
.stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff}
.stat-label{font-size:11px;color:var(--dim);margin-top:1px}

/* ── ANNOUNCEMENT ── */
.ann-banner{background:linear-gradient(90deg,var(--gold),#f0921a);color:#000;padding:10px 16px}
.ann-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1200px;margin:0 auto}
.ann-text{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.ann-penting{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;background:rgba(0,0,0,.15);padding:2px 8px;border-radius:20px;flex-shrink:0}

/* ── SECTION ── */
.section{padding:0 0 64px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
.section-label{font-size:9px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.2em;margin-bottom:4px}
.section-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.see-all{font-size:12px;color:var(--muted);transition:color .2s;cursor:pointer;background:none;border:none;font-family:inherit;display:flex;align-items:center;gap:4px}
.see-all:hover{color:var(--gold)}
.see-all svg{transition:transform .2s}
.see-all:hover svg{transform:translateX(3px)}

/* ── AUTH PAGE ── */
.auth-wrap{min-height:100vh;display:flex}
.auth-left{flex:1;display:none;position:relative;overflow:hidden;padding:48px;flex-direction:column;justify-content:center}
@media(min-width:900px){.auth-left{display:flex}}
.auth-left-bg{position:absolute;inset:0;background:linear-gradient(135deg,#111 0%,var(--bg) 100%)}
.auth-left-glow{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:var(--gold);opacity:.06;border-radius:50%;filter:blur(80px)}
.auth-left-content{position:relative;z-index:1}
.auth-left h1{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1.1;margin:40px 0 16px}
.auth-left h1 em{font-style:normal;color:var(--gold)}
.auth-left p{color:var(--muted);font-size:15px;line-height:1.6;max-width:280px}
.auth-stats{display:flex;gap:28px;margin-top:36px}
.auth-right{width:100%;max-width:480px;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
@media(min-width:900px){.auth-right{width:50%;max-width:none}}
.auth-form{width:100%;max-width:380px;padding:24px 0}
.auth-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:28px}
.auth-tab{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:800;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.06em;transition:all .2s;color:#555}
.auth-tab.active{background:var(--gold);color:#000}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{color:var(--dim);font-size:11px}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.err-box p{color:#f87171;font-size:13px}
.succ-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.succ-box p{color:#4ade80;font-size:13px}
.forgot-link{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:inherit;text-align:right}
.forgot-link:hover{text-decoration:underline}
.resend-link{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:inherit;margin-top:6px;display:block;text-align:left;padding:0}
.resend-link:hover{text-decoration:underline}
.auth-switch{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
.auth-switch button{color:var(--gold);font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit}
.auth-switch button:hover{text-decoration:underline}

/* ── PRODUCT DETAIL ── */
.pd-grid{display:grid;grid-template-columns:1fr;gap:28px;padding:28px 0}
@media(min-width:700px){.pd-grid{grid-template-columns:1fr 1fr}}
.pd-main-img{aspect-ratio:1;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:zoom-in;position:relative}
.pd-main-img img{width:100%;height:100%;object-fit:cover}
.pd-thumbs{display:flex;gap:8px;margin-top:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.pd-thumbs::-webkit-scrollbar{display:none}
.pd-thumb{width:60px;height:60px;border-radius:10px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:border-color .2s;flex-shrink:0}
.pd-thumb.active,.pd-thumb:hover{border-color:var(--gold)}
.pd-thumb img{width:100%;height:100%;object-fit:cover}
.pd-right{display:flex;flex-direction:column;gap:14px}
.pd-cat{display:inline-block;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:var(--gold);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;align-self:flex-start}
.pd-name{font-family:'Syne',sans-serif;font-size:clamp(20px,3vw,28px);font-weight:800;line-height:1.2}
.pd-price-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.pd-price-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.pd-price{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--gold)}
.stock-row{display:flex;align-items:center;gap:8px}
.stock-dot{width:8px;height:8px;border-radius:50%}
.stock-dot.in{background:#22c55e}
.stock-dot.out{background:#ef4444}
.stock-text{font-size:13px;font-weight:600}
.stock-text.in{color:#4ade80}
.stock-text.out{color:#f87171}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-label{font-size:13px;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px}
.qty-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#666;transition:all .2s;background:none;border:none;cursor:pointer}
.qty-btn:hover{color:#fff;background:var(--border)}
.qty-btn:disabled{opacity:.3;cursor:not-allowed}
.qty-val{font-family:'Syne',sans-serif;font-weight:800;min-width:28px;text-align:center;font-size:14px}
.pd-action-row{display:flex;gap:10px}
.seller-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.seller-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.seller-row{display:flex;align-items:center;gap:10px}
.seller-ava{width:36px;height:36px;border-radius:10px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold);overflow:hidden;flex-shrink:0}
.seller-ava img{width:100%;height:100%;object-fit:cover}
.seller-name{font-size:14px;font-weight:600}
.desc-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:4px}
.desc-box h2{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:10px}
.desc-box p{color:#777;font-size:13px;line-height:1.7;white-space:pre-wrap}
.reviews-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:12px}
.reviews-box h2{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px}
.review-item{border-bottom:1px solid #111;padding-bottom:14px;margin-bottom:14px}
.review-item:last-child{border:none;margin-bottom:0;padding-bottom:0}
.review-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.review-user{display:flex;align-items:center;gap:8px}
.review-ava{width:32px;height:32px;border-radius:9px;background:#1a1a1a;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#555;overflow:hidden;flex-shrink:0}
.review-ava img{width:100%;height:100%;object-fit:cover}
.review-name{font-size:13px;font-weight:600}
.review-date{font-size:11px;color:var(--dim)}
.stars{display:flex;gap:2px}
.star{font-size:12px}
.review-text{font-size:13px;color:#666;line-height:1.6;margin-top:5px}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px}
.lb-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:background .2s}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:background .2s}
.lb-prev{left:16px}
.lb-next{right:16px}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.2)}
.lb-counter{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}

/* ── CART ── */
.cart-layout{display:grid;grid-template-columns:1fr;gap:20px;padding:24px 0}
@media(min-width:800px){.cart-layout{grid-template-columns:1fr 340px}}
.cart-item{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:12px;transition:border-color .2s}
.cart-item.selected{border-color:rgba(245,166,35,.35)}
.cart-check{flex-shrink:0;margin-top:2px}
.check-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.check-box.checked{background:var(--gold);border-color:var(--gold)}
.cart-img{width:80px;height:80px;border-radius:12px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;cursor:pointer}
.cart-img img{width:100%;height:100%;object-fit:cover}
.cart-img .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#222}
.cart-body{flex:1;min-width:0}
.cart-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;transition:color .2s}
.cart-name:hover{color:var(--gold)}
.cart-seller{font-size:11px;color:var(--dim);margin-bottom:8px}
.cart-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.cart-price{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--gold)}
.cart-controls{display:flex;align-items:center;gap:6px}
.cart-qty{display:flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px}
.cart-qty button{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#555;transition:all .2s;background:none;border:none;cursor:pointer}
.cart-qty button:hover{color:#fff;background:var(--border)}
.cart-qty button:disabled{opacity:.3;cursor:not-allowed}
.cart-qty span{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;min-width:22px;text-align:center}
.del-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#333;transition:all .2s;background:none;border:none;cursor:pointer}
.del-btn:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.summary-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;position:sticky;top:76px;height:fit-content}
.summary-box h2{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:10px}
.summary-row .k{color:var(--muted)}
.summary-row .v{font-weight:600}
.summary-total{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;margin-bottom:14px}
.summary-total .k{color:#888;font-size:13px}
.summary-total .v{font-family:'Syne',sans-serif;font-weight:800;color:var(--gold);font-size:18px}
.summary-note{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.12);border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:#888;line-height:1.5}
.summary-note strong{color:var(--gold)}

/* ── TRANSACTIONS ── */
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;margin-bottom:10px}
.order-card:hover{border-color:var(--border2)}
.order-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-bottom:1px solid #111;flex-wrap:wrap}
.order-id{display:flex;align-items:center;gap:6px;min-width:0}
.order-id-label{font-size:10px;color:var(--dim)}
.order-id-val{font-size:11px;font-family:monospace;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.copy-btn{flex-shrink:0;padding:4px 6px;border-radius:6px;color:var(--dim);transition:all .2s;background:none;border:none;cursor:pointer;display:flex;align-items:center}
.copy-btn:hover,.copy-btn.copied{color:var(--gold)}
.status-badge{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.status-pending{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:#eab308}
.status-paid{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.status-cancelled{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.order-body{padding:14px 16px}
.order-items-preview{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.order-item-prev{display:flex;align-items:center;gap:8px}
.order-item-img{width:38px;height:38px;border-radius:8px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.order-item-img img{width:100%;height:100%;object-fit:cover}
.order-item-name{font-size:12px;font-weight:500;max-width:100px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.order-item-qty{font-size:11px;color:var(--dim)}
.order-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.order-meta{font-size:11px;color:var(--dim)}
.order-meta .countdown{color:#eab308;font-weight:600}
.order-meta .paid-at{color:#4ade80}
.order-right{display:flex;align-items:center;gap:10px}
.order-total{font-family:'Syne',sans-serif;font-weight:800;color:var(--gold);font-size:15px}
.filter-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.sort-select{background:var(--bg2);border:1px solid var(--border);color:#888;font-size:12px;border-radius:10px;padding:7px 12px;outline:none;cursor:pointer;font-family:inherit}
.sort-select:focus{border-color:rgba(245,166,35,.5)}

/* ── PROFILE ── */
.profile-wrap{max-width:600px;margin:0 auto;padding:24px 0}
.profile-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:16px}
.profile-top{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.profile-ava{width:60px;height:60px;border-radius:16px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--gold);overflow:hidden;flex-shrink:0}
.profile-ava img{width:100%;height:100%;object-fit:cover}
.profile-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.profile-email{font-size:12px;color:var(--dim);margin-top:2px}
.balance-box{background:#080808;border-radius:12px;padding:14px 16px;margin-bottom:18px}
.balance-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.balance-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold)}

/* ── DEPOSIT ── */
.deposit-wrap{max-width:600px;margin:0 auto;padding:24px 0}
.preset-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.preset-btn{padding:6px 12px;background:#111;border:1px solid var(--border2);color:#888;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s}
.preset-btn:hover{border-color:rgba(245,166,35,.4);color:var(--gold)}
.dep-history{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:16px}
.dep-history h2{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:14px}
.dep-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #111;font-size:13px}
.dep-item:last-child{border:none}
.dep-amount{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.dep-meta{font-size:11px;color:var(--dim);margin-top:2px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.empty p{font-size:14px;color:var(--muted);margin-bottom:24px}

/* ── FOOTER ── */
footer{
  border-top:1px solid #111;
  background:linear-gradient(180deg,#080808 0%,#050505 100%);
  padding:40px 16px 24px;margin-top:auto;
}
.foot-inner{max-width:1200px;margin:0 auto}
.foot-top{display:grid;grid-template-columns:1fr;gap:28px;margin-bottom:32px}
@media(min-width:600px){.foot-top{grid-template-columns:2fr 1fr 1fr}}
.foot-brand p{font-size:13px;color:#444;line-height:1.6;margin-top:10px;max-width:240px}
.foot-col-title{font-size:10px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.15em;margin-bottom:12px}
.foot-links{display:flex;flex-direction:column;gap:8px}
.foot-link{font-size:13px;color:#333;transition:color .2s;cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;padding:0}
.foot-link:hover{color:var(--gold)}
.foot-bottom{
  border-top:1px solid #0f0f0f;padding-top:20px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
@media(min-width:600px){.foot-bottom{flex-direction:row;justify-content:space-between}}
.foot-copy{font-size:11px;color:#222;font-family:monospace;text-transform:uppercase;letter-spacing:.1em}
.foot-badge{font-size:10px;color:#2a2a2a;display:flex;align-items:center;gap:4px}

/* ── PAGE HEADER ── */
.page-header{padding:24px 0 16px}
.page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);margin-bottom:12px}
.breadcrumb span{cursor:pointer;transition:color .2s}
.breadcrumb span:hover{color:var(--gold)}
.breadcrumb .sep{color:#333;cursor:default}
.breadcrumb .current{color:#666;cursor:default}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .nav-links,.nav-search{display:none}
  .hamburger{display:flex}
  .auth-stats{gap:20px}
  .pd-action-row{flex-direction:column}
  .order-id-val{max-width:100px}
}
@media(min-width:700px){
  .mobile-menu{display:none!important}
}
</style>
</head>

async function doSearch() {

  const grid = q('srch-grid')

  const resetBtn = q('srch-reset-btn')
  if(!grid) return

  grid.innerHTML = skelGrid(8)

  let dbq = sb.from('products')
    .select('id,name,price,stock,created_at,product_images(image_url,sort_order),seller:users!seller_id(id,username,is_verified),category:categories!category_id(id,name)')
    .eq('is_active',true)
  if(qv) dbq = dbq.ilike('name',`%${qv}%`)
  if(_srchCat) dbq = dbq.eq('category_id',_srchCat)
  if(sort==='price_asc') dbq = dbq.order('price',{ascending:true})
  else if(sort==='price_desc') dbq = dbq.order('price',{ascending:false})
  else dbq = dbq.order('created_at',{ascending:sort==='oldest'})

  const {data:prods} = await dbq.limit(40)
  const list = prods||[]

  if(infoText) infoText.textContent = `${list.length} produk${qv?` untuk "${qv}"`:_srchCat?' ditemukan':' tersedia'}`
  if(resetBtn) resetBtn.style.display = (qv||_srchCat)?'inline':'none'

  grid.innerHTML = renderProductGrid(list)

          ${esc(p.seller?.username||'Seller')}

function resetFilter() {

  })

async function addToCart(productId, btn) {
  if(!STATE.user) { navigate('auth',{tab:'login',redirect:'home'}); return }
  const orig = btn.innerHTML
  btn.innerHTML = `<div class="spin" style="margin:0 auto"></div>`
  btn.classList.add('adding'); btn.disabled=true
  const {error} = await sb.from('carts').upsert({user_id:STATE.user.id,product_id:productId,quantity:1},{onConflict:'user_id,product_id'})
  if(error) showToast('Gagal menambahkan.','error')
  else { showToast('Ditambahkan ke keranjang! 🛒'); await loadCartCount() }

function switchImg(i) {

function changeQty(d) {
  const v = Math.min(window._pdStock, Math.max(1,(window._pdQty||1)+d))
  window._pdQty = v
  const el = q('pd-qty-val')
  if(el) el.textContent = v
}

// ── CART ──────────────────────────────────────────────────
let cartItems = []
let cartSelected = []

async function renderCart() {
  if(!STATE.user) { navigate('auth',{tab:'login'}); return }
  const el = q('page-cart')
  el.innerHTML = `<div class="container"><div class="page-header"><h1 class="page-title">Keranjang</h1></div><div class="cart-layout"><div id="cart-list"><div class="empty"><div class="empty-icon">⏳</div><p>Memuat...</p></div></div><div id="cart-summary"></div></div></div>`
  await fetchCart()
  injectFooter('cart')
}

async function fetchCart() {
  const {data} = await sb.from('carts').select('id,quantity,product:products!product_id(id,name,price,stock,is_active,product_images(image_url,sort_order),seller:users!seller_id(id,username))').eq('user_id',STATE.user.id).order('created_at',{ascending:false})
  cartItems = (data||[]).filter(i=>i.product?.is_active)
  cartSelected = cartItems.map(i=>i.product.id)
  renderCartList()
  renderCartSummary()
}

function renderCartList() {
  const el = q('cart-list')
  if(!el) return
  if(!cartItems.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><h3>Keranjang kosong</h3><p>Yuk tambahkan produk!</p><button class="btn btn-gold" onclick="navigate('search')">Mulai Belanja</button></div>`
    return
  }
  el.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:13px;color:var(--muted)">${cartItems.length} item</span>
    <button class="see-all" onclick="cartToggleAll()">${cartSelected.length===cartItems.length?'Batal Pilih Semua':'Pilih Semua'}</button>
  </div>
  ${cartItems.map(item=>{
    const img=firstImg(item.product); const oos=item.product.stock===0; const sel=cartSelected.includes(item.product.id)
    return `<div class="cart-item ${sel?'selected':''}" id="ci-${item.id}">
      <div class="cart-check"><div class="check-box ${sel?'checked':''}" onclick="cartToggleSel('${item.product.id}')">
        ${sel?`<svg width="10" height="10" fill="none" stroke="#000" stroke-width="3" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg>`:''}
      </div></div>
      <div class="cart-img" onclick="navigate('product',{id:'${item.product.id}'})">
        ${img?`<img src="${esc(img)}" alt="">`:`<div class="no-img">${svgImg}</div>`}
      </div>
      <div class="cart-body">
        <div class="cart-name" onclick="navigate('product',{id:'${item.product.id}'})">${esc(item.product.name)}</div>
        <div class="cart-seller">${esc(item.product.seller?.username||'Seller')}</div>
        ${oos?`<span style="display:inline-block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;margin-bottom:4px">Stok Habis</span>`:''}
        <div class="cart-footer">
          <div class="cart-price">${rp(item.product.price*item.quantity)}</div>
          <div class="cart-controls">
            ${!oos?`<div class="cart-qty">
              <button onclick="cartUpdateQty('${item.id}',${item.quantity-1},${item.product.stock})" ${item.quantity<=1?'disabled':''}>
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
              </button>
              <span>${item.quantity}</span>
              <button onclick="cartUpdateQty('${item.id}',${item.quantity+1},${item.product.stock})" ${item.quantity>=item.product.stock?'disabled':''}>
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              </button>
            </div>`:''}
            <button class="del-btn" onclick="cartRemove('${item.id}','${item.product.id}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 4v6m4-6v6m1-10V4a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v3M4 6h16"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>`
  }).join('')}`
}

function renderCartSummary() {
  const el = q('cart-summary')
  if(!el) return
  const selItems = cartItems.filter(i=>cartSelected.includes(i.product.id))
  const total = selItems.reduce((a,i)=>a+i.product.price*i.quantity,0)
  el.innerHTML = `<div class="summary-box">
    <h2>Ringkasan</h2>
    <div class="summary-row"><span class="k">Dipilih</span><span class="v">${cartSelected.length} produk</span></div>
    <div class="summary-total"><span class="k">Total</span><span class="v">${rp(total)}</span></div>
    <div class="summary-note"><strong>⏱ Catatan:</strong> Order otomatis dibatalkan dalam 30 menit jika belum dikonfirmasi.</div>
    <button class="btn btn-gold btn-full" id="checkout-btn" onclick="cartCheckout()" ${cartSelected.length===0?'disabled style="opacity:.4;cursor:not-allowed"':''}>
      Checkout (${cartSelected.length})
    </button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px;font-size:11px" onclick="navigate('search')">+ Tambah produk lain</button>
  </div>`
}

function cartToggleSel(productId) {
  if(cartSelected.includes(productId)) cartSelected=cartSelected.filter(x=>x!==productId)
  else cartSelected.push(productId)
  renderCartList(); renderCartSummary()
}
function cartToggleAll() {
  cartSelected = cartSelected.length===cartItems.length?[]:cartItems.map(i=>i.product.id)
  renderCartList(); renderCartSummary()
}
async function cartUpdateQty(cartId, newQty, stock) {
  if(newQty<1||newQty>stock) return
  await sb.from('carts').update({quantity:newQty}).eq('id',cartId)
  const item = cartItems.find(i=>i.id===cartId)
  if(item) item.quantity = newQty
  renderCartList(); renderCartSummary()
}
async function cartRemove(cartId, productId) {
  await sb.from('carts').delete().eq('id',cartId)
  cartItems = cartItems.filter(i=>i.id!==cartId)
  cartSelected = cartSelected.filter(x=>x!==productId)
  await loadCartCount()
  renderCartList(); renderCartSummary()
  showToast('Item dihapus.')
}
async function cartCheckout() {
  if(!cartSelected.length) return
  const selItems = cartItems.filter(i=>cartSelected.includes(i.product.id))
  const oos = selItems.find(i=>i.product.stock<i.quantity)
  if(oos) { showToast(`Stok "${oos.product.name}" tidak cukup.`,'error'); return }
  const btn = q('checkout-btn')
  btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true
  const {data,error} = await sb.rpc('create_order',{p_user_id:STATE.user.id,p_items:selItems.map(i=>({product_id:i.product.id,quantity:i.quantity}))})
  if(error) { showToast(error.message||'Gagal checkout.','error'); btn.innerHTML=`Checkout (${cartSelected.length})`; btn.disabled=false; return }
  await sb.from('carts').delete().in('id',selItems.map(i=>i.id))
  showToast('Order berhasil dibuat! 🎉')
  setTimeout(()=>navigate('transactions'),1500)
}

// ── TRANSACTIONS ──────────────────────────────────────────
async function renderTransactions() {
  if(!STATE.user) { navigate('auth',{tab:'login'}); return }
  const el = q('page-transactions')
  el.innerHTML = `<div class="container"><div class="page-header"><h1 class="page-title">Riwayat Transaksi</h1><p class="page-sub">Transaksi kamu</p></div>
  <div class="filter-bar">
    <div class="filter-chips">
      <div class="chip active" onclick="txFilter('all',this)">Semua</div>
      <div class="chip" onclick="txFilter('pending',this)">Menunggu</div>
      <div class="chip" onclick="txFilter('paid',this)">Dibayar</div>
      <div class="chip" onclick="txFilter('cancelled',this)">Dibatalkan</div>
    </div>
    <select class="sort-select" id="tx-sort" onchange="txRender()">
      <option value="newest">Terbaru</option>
      <option value="oldest">Terlama</option>
    </select>
  </div>
  <div id="tx-list"><div class="empty"><div class="empty-icon">⏳</div><p>Memuat...</p></div></div></div>`
  const {data} = await sb.from('orders').select('id,status,total_price,expires_at,paid_at,created_at,order_items(id,quantity,price,product:products!product_id(id,name,product_images(image_url,sort_order)))').eq('user_id',STATE.user.id).order('created_at',{ascending:false})
  window._txOrders = data||[]
  window._txFilter = 'all'
  txRender()
  injectFooter('transactions')
}

function txFilter(f,el) {
  document.querySelectorAll('.filter-chips .chip').forEach(c=>c.classList.remove('active'))
  el.classList.add('active')
  window._txFilter = f
  txRender()
}

function txRender() {
  const sort = q('tx-sort')?.value||'newest'
  const f = window._txFilter||'all'
  let list = (window._txOrders||[]).filter(o=>f==='all'||o.status===f)
  list = list.sort((a,b)=>sort==='newest'?new Date(b.created_at)-new Date(a.created_at):new Date(a.created_at)-new Date(b.created_at))
  const el = q('tx-list')
  if(!el) return
  if(!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><h3>Belum ada transaksi</h3><button class="btn btn-gold" style="margin-top:12px" onclick="navigate('search')">Mulai Belanja</button></div>`; return }
  el.innerHTML = list.map(o=>{
    const cfg = {pending:{cls:'status-pending',label:'Menunggu'},paid:{cls:'status-paid',label:'Dibayar'},cancelled:{cls:'status-cancelled',label:'Dibatalkan'}}[o.status]||{cls:'status-cancelled',label:o.status}
    const isPending = o.status==='pending'
    const isExp = isPending&&new Date(o.expires_at)<new Date()
    const statusLabel = isExp?'Kadaluarsa':cfg.label
    const statusCls = isExp?'status-cancelled':cfg.cls
    const previews = (o.order_items||[]).slice(0,3).map(item=>{
      const img=firstImg(item.product)
      return `<div class="order-item-prev">
        <div class="order-item-img">${img?`<img src="${esc(img)}" alt="">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#222">${svgImg}</div>`}</div>
        <div><div class="order-item-name">${esc(item.product?.name||'')}</div><div class="order-item-qty">x${item.quantity}</div></div>
      </div>`
    }).join('')
    const more = (o.order_items||[]).length>3?`<span style="font-size:11px;color:var(--dim)">+${o.order_items.length-3} lainnya</span>`:''
    return `<div class="order-card">
      <div class="order-head">
        <div class="order-id">
          <span class="order-id-label">ID:</span>
          <span class="order-id-val">${esc(o.id)}</span>
          <button class="copy-btn" id="cpb-${o.id}" onclick="txCopyId('${o.id}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <span class="status-badge ${statusCls}">${statusLabel}</span>
      </div>
      <div class="order-body">
        <div class="order-items-preview">${previews}${more}</div>
        <div class="order-foot">
          <div class="order-meta">
            <div>${fmtDate(o.created_at)}</div>
            ${isPending&&!isExp?`<div class="countdown" id="cd-${o.id}">⏱ Berakhir: <span></span></div>`:''}
            ${o.status==='paid'&&o.paid_at?`<div class="paid-at">Dibayar: ${fmtDate(o.paid_at)}</div>`:''}
          </div>
          <div class="order-right">
            <span class="order-total">${rp(o.total_price)}</span>
            <div style="display:flex;gap:6px">
              ${isPending&&!isExp?`<button class="btn btn-green btn-sm" id="conf-${o.id}" onclick="txConfirm('${o.id}')">✓ Konfirmasi</button>`:''}
              <button class="btn btn-ghost btn-sm" onclick="txDetail('${o.id}')">Detail</button>
            </div>
          </div>
        </div>
      </div>
    </div>`
  }).join('')
  // start countdowns
  STATE.countdownTimers.forEach(clearInterval)
  STATE.countdownTimers = []
  list.filter(o=>o.status==='pending'&&new Date(o.expires_at)>new Date()).forEach(o=>{
    const el2 = q(`cd-${o.id}`)
    if(!el2) return
    const span = el2.querySelector('span')
    const tick = ()=>{
      const diff=new Date(o.expires_at)-new Date()
      if(diff<=0){span.textContent='Kadaluarsa';return}
      const m=Math.floor(diff/60000),s=Math.floor((diff%60000)/1000)
      span.textContent=`${m}m ${String(s).padStart(2,'0')}s`
    }
    tick()
    STATE.countdownTimers.push(setInterval(tick,1000))
  })
}

async function txCopyId(id) {
  try { await navigator.clipboard.writeText(id) } catch(e) {}
  const btn = q(`cpb-${id}`)
  if(btn) { btn.classList.add('copied'); setTimeout(()=>btn.classList.remove('copied'),2000) }
  showToast('Order ID disalin! ✅')
}

async function txConfirm(orderId) {
  const btn = q(`conf-${orderId}`)
  if(btn) { btn.innerHTML=`<div class="spin spin-light"></div>`; btn.disabled=true }
  const {error} = await sb.rpc('confirm_order',{p_order_id:orderId})
  if(error) { showToast(error.message||'Gagal.','error'); if(btn){btn.innerHTML='✓ Konfirmasi';btn.disabled=false}; return }
  const o = window._txOrders?.find(x=>x.id===orderId)
  if(o) { o.status='paid'; o.paid_at=new Date().toISOString() }
  txRender()
  showToast('Pembayaran dikonfirmasi! 🎉')
  if(STATE.user) await loadUserProfile(STATE.user)
  updateNavAuth()
}

function authStrength() {
  const p = q('a-pass')?.value||''
  const s = getStrength(p)
  const bars = document.querySelectorAll('#str-bar div')
  const colors=['','#ef4444','#eab308','#3b82f6','#22c55e']
  const labels=['','Lemah','Cukup','Kuat','Sangat Kuat']
  const textColors=['','#f87171','#fbbf24','#60a5fa','#4ade80']
  bars.forEach((b,i)=>{b.style.background=i<s?colors[s]:'var(--border2)'})
  const lbl=q('str-label')
  if(lbl){lbl.textContent=p?labels[s]:'';lbl.style.color=textColors[s]}
}

function authCheckConfirm() {
  const p=q('a-pass')?.value||'',c=q('a-confirm')?.value||''
  const err=q('confirm-err')

}

function authShowErr(msg) {
  const el=q('auth-err')
  if(el) el.innerHTML=`<div class="err-box"><p>${esc(msg)}</p></div>`
}
function authShowSucc(msg) {
  const el=q('auth-succ')
  if(el) el.innerHTML=`<div class="succ-box"><p>${esc(msg)}</p></div>`
}
function authClearMsg() { const e=q('auth-err'),s=q('auth-succ'); if(e)e.innerHTML=''; if(s)s.innerHTML='' }

async function authSubmit() {
  authClearMsg()
  if(_authTab==='login') {
    const email=q('a-email')?.value.trim(),pass=q('a-pass')?.value
    if(!email||!pass){authShowErr('Email dan password wajib diisi.');return}
    const btn=q('auth-btn'); btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass})
    if(error) {
      if(error.message.toLowerCase().includes('email not confirmed')) {
        q('auth-err').innerHTML=`<div class="err-box"><p>Email belum diverifikasi. Cek inbox/spam.</p><button class="resend-link" onclick="authResend('${esc(email)}')">Kirim ulang email verifikasi →</button></div>`
      } else if(error.message.includes('Invalid login')) authShowErr('Email atau password salah.')
      else authShowErr(error.message)
      btn.innerHTML='Masuk'; btn.disabled=false; return
    }
    if(!data.user?.email_confirmed_at) {
      await sb.auth.signOut()
      q('auth-err').innerHTML=`<div class="err-box"><p>Email belum diverifikasi.</p><button class="resend-link" onclick="authResend('${esc(email)}')">Kirim ulang →</button></div>`
      btn.innerHTML='Masuk'; btn.disabled=false; return
    }
    // success — onAuthStateChange handles redirect
  } else {
    const username=q('a-user')?.value.trim(),email=q('a-email')?.value.trim(),pass=q('a-pass')?.value,confirm=q('a-confirm')?.value
    if(!username){authShowErr('Username wajib diisi.');return}
    if(username.length<3){authShowErr('Username minimal 3 karakter.');return}
    if(!email){authShowErr('Email wajib diisi.');return}
    if(!pass||pass.length<8){authShowErr('Password minimal 8 karakter.');return}
    if(pass!==confirm){authShowErr('Konfirmasi password tidak cocok.');return}
    const btn=q('auth-btn'); btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true
    const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username}}})
    if(error){authShowErr(error.message.includes('already registered')?'Email sudah terdaftar.':error.message); btn.innerHTML='Buat Akun'; btn.disabled=false; return}
    if(data.user) await sb.from('users').update({username}).eq('id',data.user.id)
    authShowSucc('Registrasi berhasil! Cek email kamu untuk verifikasi.')
    q('auth-fields').innerHTML=`<button class="btn btn-gold btn-full" onclick="authRender('login')">Ke Halaman Login</button>`
  }
}

async function authResend(email) {
  const {error}=await sb.auth.resend({type:'signup',email})
  if(error) authShowErr(error.message)
  else authShowSucc('Email verifikasi dikirim ulang!')
}

async function authSubmitForgot() {
  authClearMsg()
  const email=q('a-email')?.value.trim()
  if(!email){authShowErr('Masukkan email kamu.');return}
  const btn=q('auth-btn'); btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true

  authShowSucc('Link reset password sudah dikirim ke email kamu!')
  q('auth-btn').style.display='none'
}

  if(!username){if(errEl)errEl.innerHTML=`<div class="err-box"><p>Username tidak boleh kosong.</p></div>`; return}
  const btn=q('p-save-btn'); btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true
  const {error}=await sb.from('users').update({username,avatar_url:ava||null}).eq('id',STATE.user.id)
  if(error){if(errEl)errEl.innerHTML=`<div class="err-box"><p>${esc(error.message)}</p></div>`}
  else {
    showToast('Profil diperbarui! ✅')
    await loadUserProfile(STATE.user)
    updateNavAuth()
    if(succEl) succEl.innerHTML=`<div class="succ-box"><p>Profil berhasil diperbarui!</p></div>`
  }
  btn.innerHTML='Simpan Perubahan'; btn.disabled=false
}

// ── DEPOSIT ───────────────────────────────────────────────
async function renderDeposit() {
  if(!STATE.user) { navigate('auth',{tab:'login'}); return }
  const u = STATE.user
  const el = q('page-deposit')
  el.innerHTML = `<div class="container"><div class="deposit-wrap">
    <div class="page-header"><h1 class="page-title">Deposit</h1><p class="page-sub">Tambah saldo untuk berbelanja</p></div>
    <div class="profile-card" style="margin-bottom:16px">
      <div class="balance-label" style="margin-bottom:4px">Saldo Saat Ini</div>
      <div class="balance-val">Rp ${((u.balance||0)).toLocaleString('id-ID')}</div>
    </div>
    <div class="profile-card">
      <h2 style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px">Request Deposit</h2>
      <div id="dep-err"></div>
      <div id="dep-succ"></div>
      <div class="field">
        <label>Jumlah</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;font-weight:600">Rp</span>
          <input id="dep-amount" type="text" placeholder="0" style="padding-left:36px" oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,'.')"/>
        </div>
        <div class="preset-btns">
          ${[10000,25000,50000,100000,250000,500000].map(n=>`<button class="preset-btn" onclick="depPreset(${n})">${rp(n)}</button>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Metode</label>
        <select id="dep-method">
          <option value="transfer">Transfer Bank</option>
          <option value="gopay">GoPay</option>
          <option value="ovo">OVO</option>
          <option value="dana">DANA</option>
          <option value="qris">QRIS</option>
        </select>
      </div>
      <div style="background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.12);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#888;line-height:1.6">
        <strong style="color:var(--gold)">ℹ️ Info:</strong> Setelah submit, admin akan memverifikasi dan menambahkan saldo kamu.
      </div>
      <button class="btn btn-gold btn-full" id="dep-btn" onclick="depSubmit()">Request Deposit</button>
    </div>
    <div id="dep-history"></div>
  </div></div>`
  depLoadHistory()
}

function depPreset(n) {
  const inp=q('dep-amount')
  if(inp) inp.value=n.toLocaleString('id-ID')
}

async function depLoadHistory() {
  const {data}=await sb.from('deposits').select('*').eq('user_id',STATE.user.id).order('created_at',{ascending:false}).limit(10)
  const hist=data||[]
  const el=q('dep-history')
  if(!hist.length||!el) return
  const sCfg={pending:'text-yellow-400',approved:'text-green-400',rejected:'text-red-400'}
  const sColor={pending:'#eab308',approved:'#22c55e',rejected:'#ef4444'}
  el.innerHTML=`<div class="dep-history"><h2>Riwayat Deposit</h2>${hist.map(d=>`
    <div class="dep-item">
      <div><div class="dep-amount">${rp(d.amount)}</div><div class="dep-meta">${esc(d.method)} · ${fmtDate(d.created_at)}</div></div>
      <span style="font-size:11px;font-weight:800;text-transform:uppercase;color:${sColor[d.status]||'#555'}">${d.status}</span>
    </div>`).join('')}</div>`
}

async function depSubmit() {
  const errEl=q('dep-err'),succEl=q('dep-succ')
  if(errEl)errEl.innerHTML=''; if(succEl)succEl.innerHTML=''
  const raw=q('dep-amount')?.value.replace(/\./g,'')||'0'
  const amount=parseInt(raw,10)
  if(!amount||amount<10000){if(errEl)errEl.innerHTML=`<div class="err-box"><p>Minimal deposit Rp 10.000</p></div>`; return}
  const method=q('dep-method')?.value||'transfer'
  const btn=q('dep-btn'); btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true
  const {error}=await sb.from('deposits').insert({user_id:STATE.user.id,amount,method,status:'pending'})
  if(error){if(errEl)errEl.innerHTML=`<div class="err-box"><p>${esc(error.message)}</p></div>`}
  else {
    if(succEl)succEl.innerHTML=`<div class="succ-box"><p>Request deposit dikirim! Tunggu konfirmasi admin.</p></div>`
    q('dep-amount').value=''
    showToast('Request deposit dikirim!')
    depLoadHistory()
  }
  btn.innerHTML='Request Deposit'; btn.disabled=false
}

// inject footer setelah render konten, dipanggil tiap navigate
function injectFooter(pageId) {
  // auth page tidak pakai footer
  if(pageId === 'auth') return
  const el = q(`page-${pageId}`)
  if(!el || el.querySelector('footer')) return
  el.insertAdjacentHTML('beforeend', FOOTER_HTML)
}

// ── REALTIME CART ─────────────────────────────────────────
function startCartRealtime() {
  if(window._cartChannel) sb.removeChannel(window._cartChannel)
  if(!STATE.user) return
  window._cartChannel = sb.channel('cart-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'carts',filter:`user_id=eq.${STATE.user.id}`},
      async()=>{ await loadCartCount() })
    .subscribe()
}

// ── INIT ──────────────────────────────────────────────────
;(async()=>{
  await initAuth()
  if(STATE.user) startCartRealtime()
  renderHome()
  injectFooter('home')

  // sb auth listener untuk start realtime setelah login
  sb.auth.onAuthStateChange((ev)=>{
    if(ev==='SIGNED_IN') startCartRealtime()
    else if(ev==='SIGNED_OUT') {
      if(window._cartChannel) sb.removeChannel(window._cartChannel)
    }
  })
})()
</script>
