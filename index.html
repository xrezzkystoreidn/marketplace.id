<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<meta name="theme-color" content="#080808"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="XREZZKY"/>
<meta name="description" content="XREZZKY Official Store — Marketplace modern Indonesia. Aman, terpercaya, transparan."/>
<title>XREZZKY Official Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#f5a623;--gold2:#e09515;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#141414;
  --border:#1a1a1a;--border2:#222;
  --text:#fff;--muted:#555;--dim:#333;
  --red:#ef4444;--green:#22c55e;--yellow:#eab308;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;min-height:100vh;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;outline:none}
input,select,textarea{font-family:inherit;outline:none;border:none}
input[type="date"]{color-scheme:dark}
img{display:block;max-width:100%}
.brand{font-family:'Syne',sans-serif}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:4px}
.sb-none{scrollbar-width:none;-ms-overflow-style:none}
.sb-none::-webkit-scrollbar{display:none}

/* ── LAYOUT ── */
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}
.wrap{max-width:1200px;margin:0 auto;padding:0 16px;width:100%}
@media(min-width:600px){.wrap{padding:0 24px}}

/* ── NAVBAR ── */
#nav{
  position:sticky;top:0;z-index:200;
  background:rgba(8,8,8,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid transparent;transition:border-color .3s;flex-shrink:0;
}
#nav.scrolled{border-color:var(--border)}
.nav-wrap{display:flex;align-items:center;height:56px;gap:8px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:pointer}
.logo-icon{width:34px;height:34px;background:var(--gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:900;color:#000;font-size:15px;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.14em;font-size:13px;text-transform:uppercase;white-space:nowrap}
.nav-links{display:flex;gap:2px;margin-left:12px}
.nav-link{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;cursor:pointer}
.nav-link:hover{color:#fff;background:var(--bg3)}
.nav-link.on{color:var(--gold);background:rgba(245,166,35,.1)}
.nav-srch{flex:1;max-width:280px;margin-left:auto;position:relative}
.nav-srch input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:#fff;border-radius:10px;padding:8px 36px 8px 12px;font-size:13px;transition:border-color .2s}
.nav-srch input::placeholder{color:var(--dim)}
.nav-srch input:focus{border-color:rgba(245,166,35,.4)}
.nav-srch svg{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none}
.nav-right{display:flex;align-items:center;gap:6px;margin-left:8px;flex-shrink:0}
.cart-btn{position:relative;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s;cursor:pointer;flex-shrink:0}
.cart-btn:hover{color:#fff;background:var(--bg3)}
.cart-badge{position:absolute;top:-2px;right:-2px;min-width:17px;height:17px;background:var(--gold);color:#000;font-size:9px;font-weight:900;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.user-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:10px;cursor:pointer;transition:all .2s}
.user-btn:hover{background:var(--bg3)}
.ava{width:28px;height:28px;border-radius:8px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--gold);overflow:hidden;flex-shrink:0}
.ava img{width:100%;height:100%;object-fit:cover}
.chevron{color:var(--dim);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

/* ── DROPDOWN ── */
.drop{position:absolute;right:0;top:calc(100% + 8px);width:220px;background:var(--bg2);border:1px solid var(--border2);border-radius:18px;overflow:hidden;box-shadow:0 24px 48px rgba(0,0,0,.6);z-index:300}
.drop-info{padding:14px 16px;border-bottom:1px solid var(--border)}
.drop-info .dn{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-info .de{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-bal{padding:10px 16px;border-bottom:1px solid var(--border)}
.drop-bal .dl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.drop-bal .dv{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--gold)}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:#888;transition:all .15s;cursor:pointer}
.drop-item:hover{color:#fff;background:var(--bg3)}
.drop-item.red{color:var(--red)}
.drop-item.red:hover{background:rgba(239,68,68,.08)}
.role-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.rp-admin{background:rgba(168,85,247,.15);color:#a855f7}
.rp-seller{background:rgba(59,130,246,.15);color:#60a5fa}
.rp-buyer{background:rgba(245,166,35,.15);color:var(--gold)}

/* ── HAMBURGER ── */
.hamburger{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;flex-shrink:0;transition:all .2s;display:none}
.hamburger:hover{color:#fff;background:var(--bg3)}
.mob-menu{display:none;flex-direction:column;gap:2px;padding:10px 12px 12px;border-top:1px solid var(--border);background:rgba(8,8,8,.98)}
.mob-menu.open{display:flex}
.mob-link{padding:10px 12px;border-radius:10px;font-size:14px;color:var(--muted);transition:all .2s;cursor:pointer}
.mob-link:hover,.mob-link.on{color:#fff;background:var(--bg3)}
.mob-link.on{color:var(--gold);background:rgba(245,166,35,.08)}
.mob-srch{position:relative;margin-bottom:4px}
.mob-srch input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:#fff;border-radius:10px;padding:10px 36px 10px 12px;font-size:14px}
.mob-srch input::placeholder{color:var(--dim)}
.mob-srch button{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);display:flex;align-items:center}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);
  z-index:9999;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:600;
  white-space:nowrap;opacity:0;transition:all .25s;pointer-events:none;max-width:calc(100vw - 32px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--bg2);border:1px solid rgba(245,166,35,.3);color:#fff}
#toast.err{background:#100000;border:1px solid rgba(239,68,68,.4);color:#f87171}
#toast.info{background:#001020;border:1px solid rgba(59,130,246,.3);color:#60a5fa}
#toast.info{background:#001020;border:1px solid rgba(59,130,246,.3);color:#60a5fa}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .25s}
.modal-ov.open .modal-box{transform:translateY(0)}
@media(min-width:600px){.modal-ov{align-items:center}.modal-box{border-radius:20px}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-hd h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.modal-bd{padding:20px}
.x-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dim);transition:all .2s}
.x-btn:hover{color:#fff;background:var(--bg3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:700;letter-spacing:.04em;transition:all .2s;cursor:pointer;font-family:'Syne',sans-serif;border:none;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover:not(:disabled){background:var(--gold2)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(245,166,35,.35)}
.btn-outline:hover:not(:disabled){background:rgba(245,166,35,.08)}
.btn-ghost{background:var(--bg3);color:#888;border:1px solid var(--border2)}
.btn-ghost:hover:not(:disabled){color:#fff;border-color:#333}
.btn-red{background:transparent;color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-red:hover:not(:disabled){background:rgba(239,68,68,.08)}
.btn-green{background:#16a34a;color:#fff}
.btn-green:hover:not(:disabled){background:#15803d}
.btn-full{width:100%}
.btn-sm{padding:7px 14px;font-size:11px;border-radius:9px;letter-spacing:.03em}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spin-w{border-color:rgba(255,255,255,.2);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FIELDS ── */
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.fi{width:100%;background:var(--bg3);border:1.5px solid var(--border2);color:#fff;border-radius:12px;padding:12px 14px;font-size:14px;transition:border-color .2s}
.fi::placeholder{color:var(--dim)}
.fi:focus{border-color:var(--gold)}
.fi-err{border-color:var(--red)}
.fi-ok{border-color:var(--green)}
.fi-hint{font-size:11px;color:var(--dim);margin-top:4px}
.fi-err-msg{font-size:11px;color:#f87171;margin-top:4px}
textarea.fi{resize:vertical;min-height:80px}
select.fi{cursor:pointer;-webkit-appearance:none}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:18px}
.card-p{padding:18px}

/* ── PRODUCT GRID ── */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:480px){.pg{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.pg{grid-template-columns:repeat(4,1fr);gap:14px}}
@media(min-width:1100px){.pg{grid-template-columns:repeat(5,1fr)}}

/* ── PRODUCT CARD ── */
.pc{background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;transition:all .3s;display:flex;flex-direction:column;cursor:pointer;position:relative}
.pc:hover{border-color:rgba(245,166,35,.35);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.pc:active{transform:scale(.98)}
.pc-img{aspect-ratio:1;background:var(--bg3);overflow:hidden;position:relative}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.pc:hover .pc-img img{transform:scale(1.07)}
.pc-img .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.pc-oos{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.pc-cat{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);color:#888;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.04em}
.pc-new{position:absolute;top:7px;right:7px;background:var(--gold);color:#000;font-size:8px;font-weight:900;padding:3px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.pc-info{padding:10px;flex:1;display:flex;flex-direction:column;gap:3px}
.pc-name{font-size:13px;font-weight:600;color:#ddd;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color .2s}
.pc:hover .pc-name{color:var(--gold)}
.pc-seller{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:3px}
.pc-price{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--gold);margin-top:auto;padding-top:5px}
.pc-stock{font-size:10px;color:var(--dim);margin-bottom:6px}
.pc-stock.oos{color:var(--red)}
.add-btn{width:100%;padding:9px;border-radius:10px;background:rgba(245,166,35,.1);color:var(--gold);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;border:1.5px solid rgba(245,166,35,.2);cursor:pointer;font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .25s}
.add-btn:hover{background:var(--gold);color:#000;border-color:var(--gold)}
.add-btn:active{transform:scale(.97)}
.add-btn:disabled{background:#111;color:#333;border-color:#1a1a1a;cursor:not-allowed}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,#111 25%,#181818 50%,#111 75%);background-size:200% 100%;animation:skel 1.8s ease-in-out infinite;border-radius:8px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── CHIP ── */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
.chips.sb-none::-webkit-scrollbar{display:none}
.chip{padding:7px 15px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:var(--bg3);color:#555;white-space:nowrap;transition:all .2s;flex-shrink:0}
.chip:hover{color:#fff;border-color:#333}
.chip.on{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;padding:60px 0 48px;flex-shrink:0}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(245,166,35,.04),transparent 65%),linear-gradient(160deg,#0d0d0d,var(--bg))}
.hero-g1{position:absolute;top:-60px;right:-60px;width:500px;height:500px;background:var(--gold);opacity:.03;border-radius:50%;filter:blur(100px)}
.hero-g2{position:absolute;bottom:-80px;left:-60px;width:300px;height:300px;background:#3b82f6;opacity:.02;border-radius:50%;filter:blur(80px)}
.hero-inner{position:relative;z-index:1;max-width:620px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:20px;padding:5px 13px;margin-bottom:18px}
.hero-badge .dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:dot 2s ease-in-out infinite}
@keyframes dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.hero-badge span{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.12em}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:800;line-height:1.06;margin-bottom:14px}
.hero h1 em{font-style:normal;color:var(--gold)}
.hero p{color:#666;font-size:15px;line-height:1.7;margin-bottom:26px;max-width:400px}
.hero-btns{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:36px}
.stats{display:flex;gap:24px;flex-wrap:wrap}
.stat{padding-left:12px;border-left:2px solid rgba(245,166,35,.3)}
.stat-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff}
.stat-l{font-size:11px;color:var(--dim);margin-top:1px}

/* ── ANN BANNER ── */
.ann{background:linear-gradient(90deg,var(--gold),#f0921a);color:#000;padding:10px 0;flex-shrink:0}
.ann-in{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ann-t{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.ann-badge{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;background:rgba(0,0,0,.15);padding:2px 8px;border-radius:20px;flex-shrink:0}

/* ── SECTION ── */
.sec{padding:0 0 56px;flex:1}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px}
.sec-label{font-size:9px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.2em;margin-bottom:4px}
.sec-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.see-all{font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;display:flex;align-items:center;gap:4px;transition:color .2s}
.see-all:hover{color:var(--gold)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.6}
.empty h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.empty p{font-size:13px;color:var(--muted);margin-bottom:20px}

/* ── AUTH PAGE ── */
.auth-wrap{display:flex;min-height:100vh;width:100%}
.auth-left{display:none;flex:1;position:relative;padding:48px;flex-direction:column;justify-content:center;overflow:hidden}
@media(min-width:860px){.auth-left{display:flex}}
.auth-lb{position:absolute;inset:0;background:linear-gradient(135deg,#0e0e0e,var(--bg))}
.auth-lg{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:380px;height:380px;background:var(--gold);opacity:.055;border-radius:50%;filter:blur(80px)}
.auth-lc{position:relative;z-index:1}
.auth-lc h1{font-family:'Syne',sans-serif;font-size:46px;font-weight:800;line-height:1.1;margin:36px 0 14px}
.auth-lc h1 em{font-style:normal;color:var(--gold)}
.auth-lc p{color:var(--muted);font-size:15px;line-height:1.6;max-width:280px}
.auth-stats{display:flex;gap:24px;margin-top:32px}
.auth-right{width:100%;display:flex;align-items:center;justify-content:center;padding:24px 20px;overflow-y:auto}
@media(min-width:860px){.auth-right{width:460px;flex-shrink:0}}
.auth-form{width:100%;max-width:380px;padding:20px 0}
.auth-tabs{display:flex;gap:4px;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:4px;margin-bottom:26px}
.auth-tab{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:800;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.05em;transition:all .2s;color:#444;cursor:pointer}
.auth-tab.on{background:var(--gold);color:#000}
.err-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.err-box p{color:#f87171;font-size:13px;line-height:1.5}
.ok-box{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.ok-box p{color:#4ade80;font-size:13px;line-height:1.5}
.pass-wrap{position:relative}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--dim);display:flex;align-items:center;cursor:pointer}
.eye-btn:hover{color:#888}
.str-bar{display:flex;gap:3px;margin-top:6px}
.str-bar div{height:3px;flex:1;border-radius:2px;background:var(--border2);transition:background .3s}
.str-lbl{font-size:11px;margin-top:3px}
.auth-sw{text-align:center;font-size:13px;color:var(--muted);margin-top:14px}
.auth-sw button{color:var(--gold);font-weight:600;cursor:pointer;font-family:inherit;background:none;border:none}
.auth-sw button:hover{text-decoration:underline}
.rl{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:inherit;display:block;margin-top:6px;text-align:left}
.rl:hover{text-decoration:underline}

/* ── PRODUCT DETAIL ── */
.pd-grid{display:grid;grid-template-columns:1fr;gap:24px;padding:20px 0 56px}
@media(min-width:680px){.pd-grid{grid-template-columns:1fr 1fr}}
.pd-img{aspect-ratio:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;overflow:hidden;position:relative;cursor:zoom-in}
.pd-img img{width:100%;height:100%;object-fit:cover}
.pd-img-count{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;backdrop-filter:blur(4px)}
.pd-thumbs{display:flex;gap:8px;margin-top:8px;overflow-x:auto}
.pd-thumbs.sb-none::-webkit-scrollbar{display:none}
.pd-thumb{width:60px;height:60px;border-radius:10px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:border-color .2s;flex-shrink:0}
.pd-thumb.on,.pd-thumb:hover{border-color:var(--gold)}
.pd-thumb img{width:100%;height:100%;object-fit:cover}
.pd-info{display:flex;flex-direction:column;gap:14px}
.pd-cat{display:inline-block;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:var(--gold);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;align-self:flex-start}
.pd-name{font-family:'Syne',sans-serif;font-size:clamp(19px,2.5vw,26px);font-weight:800;line-height:1.2}
.pd-price-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px}
.pd-price-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.pd-price{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--gold)}
.stock-row{display:flex;align-items:center;gap:8px}
.stock-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stock-dot.in{background:var(--green)}
.stock-dot.out{background:var(--red)}
.qty-row{display:flex;align-items:center;gap:12px}
.qty-ctrl{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:4px}
.qty-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#666;cursor:pointer;transition:all .2s}
.qty-btn:hover:not(:disabled){color:#fff;background:var(--border)}
.qty-btn:disabled{opacity:.3;cursor:not-allowed}
.qty-val{font-family:'Syne',sans-serif;font-weight:800;min-width:28px;text-align:center;font-size:14px}
.pd-acts{display:flex;gap:10px;flex-wrap:wrap}
.pd-acts .btn{flex:1;min-width:120px}
.seller-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px}
.seller-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.seller-row{display:flex;align-items:center;gap:10px}
.seller-ava{width:36px;height:36px;border-radius:10px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--gold);overflow:hidden;flex-shrink:0}
.seller-ava img{width:100%;height:100%;object-fit:cover}

/* ── CART ── */
.cart-layout{display:grid;grid-template-columns:1fr;gap:18px;padding:20px 0 56px}
@media(min-width:800px){.cart-layout{grid-template-columns:1fr 340px}}
.ci{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:12px;transition:border-color .2s;margin-bottom:10px}
.ci.sel{border-color:rgba(245,166,35,.35)}
.ci-check{flex-shrink:0;margin-top:2px;cursor:pointer}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.on{background:var(--gold);border-color:var(--gold)}
.ci-img{width:76px;height:76px;border-radius:12px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);flex-shrink:0;cursor:pointer}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-body{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px;cursor:pointer;transition:color .2s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci-name:hover{color:var(--gold)}
.ci-seller{font-size:11px;color:var(--dim);margin-bottom:8px}
.ci-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ci-price{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--gold)}
.ci-ctrls{display:flex;align-items:center;gap:6px}
.qty-sm{display:flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:3px}
.qty-sm button{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#555;cursor:pointer;transition:all .15s}
.qty-sm button:hover:not(:disabled){color:#fff;background:var(--border2)}
.qty-sm button:disabled{opacity:.3;cursor:not-allowed}
.qty-sm span{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;min-width:22px;text-align:center}
.del-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#333;cursor:pointer;transition:all .2s}
.del-btn:hover{color:var(--red);background:rgba(239,68,68,.08)}
.sum-box{background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;padding:20px;position:sticky;top:70px;height:fit-content}
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:10px}
.sum-row .k{color:var(--muted)}
.sum-total{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:12px;margin:4px 0 14px}
.sum-total .k{color:#888;font-size:13px}
.sum-total .v{font-family:'Syne',sans-serif;font-weight:800;color:var(--gold);font-size:18px}
.note-box{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.12);border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px;color:#888;line-height:1.5}

/* ── TRANSACTIONS ── */
.oc{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;transition:border-color .2s}
.oc:hover{border-color:var(--border2)}
.oc-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 16px;border-bottom:1px solid #111;flex-wrap:wrap}
.oc-id{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.oc-id-lbl{font-size:10px;color:var(--dim);flex-shrink:0}
.oc-id-val{font-size:11px;font-family:monospace;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.copy-btn{flex-shrink:0;padding:4px 6px;border-radius:6px;color:var(--dim);transition:all .15s;display:flex;align-items:center;cursor:pointer}
.copy-btn:hover,.copy-btn.ok{color:var(--gold)}
.st-badge{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.st-pending{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);color:var(--yellow)}
.st-paid{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.st-cancelled{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.oc-body{padding:14px 16px}
.oc-items{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.oc-item{display:flex;align-items:center;gap:8px}
.oc-item-img{width:38px;height:38px;border-radius:8px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.oc-item-img img{width:100%;height:100%;object-fit:cover}
.oc-item-name{font-size:12px;font-weight:500;max-width:90px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.oc-item-qty{font-size:11px;color:var(--dim)}
.oc-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.oc-meta{font-size:11px;color:var(--dim)}
.oc-countdown{color:var(--yellow);font-weight:600}
.oc-paid-at{color:var(--green)}
.oc-right{display:flex;align-items:center;gap:10px}
.oc-total{font-family:'Syne',sans-serif;font-weight:800;color:var(--gold);font-size:15px}
.flt-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.sort-sel{background:var(--bg2);border:1.5px solid var(--border);color:#888;font-size:12px;border-radius:10px;padding:7px 12px;cursor:pointer;font-family:inherit;transition:border-color .2s}
.sort-sel:focus{border-color:rgba(245,166,35,.4)}

/* ── PROFILE ── */
.pw{max-width:580px;margin:0 auto;padding:20px 0 56px;flex:1}
.pc-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.pc-ava{width:60px;height:60px;border-radius:16px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--gold);overflow:hidden;flex-shrink:0}
.pc-ava img{width:100%;height:100%;object-fit:cover}
.bal-box{background:#0a0a0a;border-radius:12px;padding:14px 16px;margin-bottom:16px}
.bal-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.bal-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold)}

/* ── DEPOSIT ── */
.dw{max-width:580px;margin:0 auto;padding:20px 0 56px;flex:1}
.preset-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.preset-btn{padding:6px 12px;background:var(--bg3);border:1.5px solid var(--border2);color:#888;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.preset-btn:hover{border-color:rgba(245,166,35,.4);color:var(--gold)}

/* ── SELLER STEPS ── */
.steps-wrap{display:flex;align-items:center;margin-bottom:24px}
.step-col{flex:1;display:flex;align-items:center}
.step-node{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .3s;flex-shrink:0}
.step-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;transition:color .3s}
.step-line{height:2px;flex:1;margin-bottom:18px;transition:background .3s}

/* ── ABOUT PAGE ── */
.about-sec{margin-bottom:44px}
.about-sec h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:14px}
.about-body{font-size:14px;color:#666;line-height:1.8}
.about-body p{margin-bottom:12px}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lb.open{opacity:1;pointer-events:all}
.lb img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:12px}
.lb-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}
.lb-close:hover{background:rgba(255,255,255,.2)}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:background .2s}
.lb-prev{left:14px}.lb-next{right:14px}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,.2)}
.lb-count{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}

/* ── FOOTER ── */
.footer{border-top:1px solid #0e0e0e;background:linear-gradient(180deg,#080808,#050505);padding:36px 0 20px;flex-shrink:0}
.foot-top{display:grid;grid-template-columns:1fr;gap:24px;margin-bottom:28px}
@media(min-width:560px){.foot-top{grid-template-columns:2fr 1fr 1fr}}
.foot-brand p{font-size:13px;color:#3a3a3a;line-height:1.6;margin-top:10px;max-width:220px}
.foot-col-title{font-size:10px;font-weight:800;color:#3a3a3a;text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px}
.foot-links{display:flex;flex-direction:column;gap:8px}
.foot-link{font-size:13px;color:#2e2e2e;cursor:pointer;transition:color .2s;text-align:left}
.foot-link:hover{color:var(--gold)}
.foot-bottom{border-top:1px solid #0e0e0e;padding-top:18px;display:flex;flex-direction:column;align-items:center;gap:6px}
@media(min-width:560px){.foot-bottom{flex-direction:row;justify-content:space-between}}
.foot-copy{font-size:11px;color:#1e1e1e;font-family:monospace;text-transform:uppercase;letter-spacing:.08em}
.foot-safe{font-size:11px;color:#1e1e1e;display:flex;align-items:center;gap:4px}

/* ── PAGE HEADER ── */
.ph{padding:20px 0 14px;flex-shrink:0}
.ph-label{font-size:9px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.2em;margin-bottom:4px}
.ph-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.ph-sub{font-size:13px;color:var(--muted);margin-top:3px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);margin-bottom:10px;flex-wrap:wrap}
.breadcrumb span{cursor:pointer;transition:color .2s}
.breadcrumb span:hover{color:var(--gold)}
.breadcrumb .sep{cursor:default;color:#222}
.breadcrumb .cur{color:#555;cursor:default}

/* ── SELLER PROMO BANNER ── */
.seller-promo{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.03));border:1.5px solid rgba(245,166,35,.2);border-radius:18px;padding:18px;margin-bottom:16px;position:relative;overflow:hidden}
.seller-promo::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:var(--gold);opacity:.06;border-radius:50%;filter:blur(30px)}

/* ── SEARCH PAGE ── */
.srch-header{background:linear-gradient(180deg,#0d0d0d,var(--bg));padding:24px 0 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.srch-input-wrap{position:relative;margin-top:12px}
.srch-input-wrap input{width:100%;background:var(--bg3);border:1.5px solid var(--border2);color:#fff;border-radius:14px;padding:13px 50px 13px 16px;font-size:14px;transition:all .2s}
.srch-input-wrap input::placeholder{color:var(--dim)}
.srch-input-wrap input:focus{border-color:rgba(245,166,35,.5);background:#111}
.srch-submit{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.srch-submit:hover{background:var(--gold2)}

/* ── RESPONSIVE EXTRAS ── */
@media(max-width:700px){
  .nav-links,.nav-srch{display:none}
  .hamburger{display:flex}
  .pd-acts .btn{min-width:0}
  .oc-id-val{max-width:100px}
  .sum-box{position:static}
  .hero{padding:40px 0 36px}
}
@media(min-width:700px){.mob-menu{display:none!important}}
@media(max-width:380px){
  .pg{grid-template-columns:1fr}
  .stats{gap:14px}
  .hero h1{font-size:26px}
}
@media(hover:none) and (pointer:coarse){
  .pc:hover{transform:none;box-shadow:none;border-color:var(--border)}
  .add-btn:hover{background:rgba(245,166,35,.1);color:var(--gold);border-color:rgba(245,166,35,.2)}
  .pc:active{border-color:rgba(245,166,35,.3);transform:scale(.99)}
  .btn-gold:hover{background:var(--gold)}
  .btn-ghost:hover{color:#888;border-color:var(--border2)}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.pg .pc{animation:fadeUp .35s ease both}
.pg .pc:nth-child(1){animation-delay:.03s}.pg .pc:nth-child(2){animation-delay:.06s}
.pg .pc:nth-child(3){animation-delay:.09s}.pg .pc:nth-child(4){animation-delay:.12s}
.pg .pc:nth-child(5){animation-delay:.03s}.pg .pc:nth-child(6){animation-delay:.06s}
.pg .pc:nth-child(7){animation-delay:.09s}.pg .pc:nth-child(8){animation-delay:.12s}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="nav">
  <div class="wrap">
    <div class="nav-wrap">
      <div class="logo" onclick="go('home')">
        <div class="logo-icon">X</div>
        <span class="logo-text">XREZZKY</span>
      </div>
      <div class="nav-links">
        <span class="nav-link on" id="nl-home" onclick="go('home')">Beranda</span>
        <span class="nav-link" id="nl-search" onclick="go('search')">Produk</span>
      </div>
      <div class="nav-srch">
        <input id="nav-q" type="text" placeholder="Cari produk..." onkeydown="if(event.key==='Enter')navSearch()"/>
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <div class="nav-right">
        <div class="cart-btn" id="cart-btn" onclick="go('cart')" style="display:none">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </div>
        <div id="user-area"></div>
      </div>
      <div class="hamburger" id="ham" onclick="toggleMob()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="ham-ico"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
    </div>
  </div>
  <div class="mob-menu" id="mob-menu">
    <div class="mob-srch">
      <input type="text" id="mob-q" placeholder="Cari produk..." onkeydown="if(event.key==='Enter')mobSearch()"/>
      <button onclick="mobSearch()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
    </div>
    <span class="mob-link on" id="ml-home" onclick="go('home');closeMob()">Beranda</span>
    <span class="mob-link" id="ml-search" onclick="go('search');closeMob()">Produk</span>
    <div id="mob-auth"></div>
  </div>
</nav>

<!-- PAGES -->
<div id="pg-home"    class="page active"></div>
<div id="pg-search"  class="page"></div>
<div id="pg-product" class="page"></div>
<div id="pg-cart"    class="page"></div>
<div id="pg-tx"      class="page"></div>
<div id="pg-auth"    class="page"></div>
<div id="pg-profile" class="page"></div>
<div id="pg-deposit" class="page"></div>
<div id="pg-seller"  class="page"></div>
<div id="pg-about"   class="page"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="lbClose()">
  <div class="lb-close" onclick="lbClose()">✕</div>
  <div class="lb-prev" onclick="event.stopPropagation();lbPrev()">‹</div>
  <img id="lb-img" src="" alt=""/>
  <div class="lb-next" onclick="event.stopPropagation();lbNext()">›</div>
  <div class="lb-count" id="lb-count"></div>
</div>

<!-- ORDER MODAL -->
<div class="modal-ov" id="od-modal" onclick="closeOdModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <h3>Detail Order</h3>
      <div class="x-btn" onclick="closeOdModal()">✕</div>
    </div>
    <div class="modal-bd" id="od-modal-body"></div>
  </div>
</div>

// ── CLOUDINARY ────────────────────────────────────────────
async function uploadCDN(file) {
  const fd = new FormData()
  fd.append('file', file)
  fd.append('upload_preset', CDN_PRESET)
  fd.append('folder', 'xrezzky')
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CDN_NAME}/image/upload`, {method:'POST',body:fd})
  const data = await res.json()
  if(data.error) throw new Error(data.error.message)
  return data.secure_url
}

// ── NAVIGATE ─────────────────────────────────────────────
let _authRedirect = null
function go(page, params={}) {
  const el=q(`pg-${page}`)
  if(!el) { console.warn('Page not found:',page); return }
  ST.cdTimers.forEach(clearInterval); ST.cdTimers=[]

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  el.classList.add('active')
  ST.page=page
  closeDrop(); closeMob()

  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('on'))
  document.querySelectorAll('.mob-link').forEach(l=>l.classList.remove('on'))
  if(page==='home'){ q('nl-home')?.classList.add('on'); q('ml-home')?.classList.add('on') }
  if(page==='search'){ q('nl-search')?.classList.add('on'); q('ml-search')?.classList.add('on') }

  window.scrollTo({top:0,behavior:'instant'})
  if(page!=='home') history.pushState({page,params},'',location.pathname)

  switch(page) {
    case 'home':    pgHome(); break
    case 'search':  pgSearch(params); break
    case 'product': if(params?.id) pgProduct(params.id); else go('home'); break
    case 'cart':    pgCart(); break
    case 'tx':      pgTx(); break
    case 'auth':    pgAuth(params); break
    case 'profile': pgProfile(); break
    case 'deposit': pgDeposit(); break
    case 'seller':  pgSeller(); break
    case 'about':   pgAbout(); break
    default: go('home')
  }
}

window.addEventListener('popstate', e=>{
  if(e.state?.page) go(e.state.page, e.state.params||{})
  else go('home')
})
window.addEventListener('scroll',()=>{ q('nav')?.classList.toggle('scrolled',window.scrollY>10) },{ passive:true })

async function addCart(productId, btn) {
  if(!ST.user) { go('auth',{tab:'login',redirect:'home'}); return }
  const orig=btn.innerHTML
  btn.innerHTML=`<div class="spin"></div>`; btn.disabled=true
  const {error}=await sb.from('carts').upsert({user_id:ST.user.id,product_id:productId,quantity:1},{onConflict:'user_id,product_id'})
  if(error) toast('Gagal menambahkan: '+error.message,'err')
  else { toast('Ditambahkan ke keranjang! 🛒'); await refreshCartCount() }
  btn.innerHTML=orig; btn.disabled=false
}

function lbPrev() { ST.lbIdx=(ST.lbIdx-1+ST.lbImgs.length)%ST.lbImgs.length; _lbUpdate() }
function lbNext() { ST.lbIdx=(ST.lbIdx+1)%ST.lbImgs.length; _lbUpdate() }
function _lbUpdate() { q('lb-img').src=ST.lbImgs[ST.lbIdx]; q('lb-count').textContent=`${ST.lbIdx+1} / ${ST.lbImgs.length}` }
document.addEventListener('keydown',e=>{ if(!q('lb').classList.contains('open')) return; if(e.key==='ArrowLeft')lbPrev(); if(e.key==='ArrowRight')lbNext(); if(e.key==='Escape')lbClose() })

async function homeCat(catId, btn) {

  let dbq=sb.from('products').select('id,name,price,stock,created_at,product_images(image_url,sort_order),seller:users!seller_id(id,username),category:categories!category_id(id,name)').eq('is_active',true).order('created_at',{ascending:false}).limit(20)
  if(catId!=='all') dbq=dbq.eq('category_id',catId)
  try {
    const {data,error}=await dbq

    grid.innerHTML=productGrid(data||[], 'Belum ada produk')
  } catch(e) {
    console.error('homeCat:',e)
    grid.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Gagal memuat produk</h3><p>${esc(e.message)}</p><button class="btn btn-gold btn-sm" onclick="homeCat('all',document.querySelector('#home-cats .chip'))">Coba Lagi</button></div>`

      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--dim)">
        <span id="srch-info-txt"></span>
        <button id="srch-reset-btn" onclick="resetFilter()" style="display:none;color:var(--gold);background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;text-decoration:underline">Reset</button>
      </div>
      <div id="srch-grid">${skelGrid(8)}</div>
    </div>`

  if(!ST.categories.length) {
    try{const {data}=await sb.from('categories').select('id,name').order('name');ST.categories=data||[]}catch(e){ST.categories=[]}
  }
  const catEl=q('srch-cats')
  if(catEl) ST.categories.forEach(c=>{ catEl.innerHTML+=`<div class="chip" onclick="srchCat('${c.id}',this)">${esc(c.name)}</div>` })

  if(params.cat) {
    const t=[...(catEl?.querySelectorAll('.chip')||[])].find(c=>c.getAttribute('onclick')?.includes(params.cat))
    if(t) srchCat(params.cat,t)
    else doSearch()
  } else doSearch()

  injectFooter('search')
}

function srchDebounce() { clearTimeout(_srchTimer); _srchTimer=setTimeout(doSearch,450) }
function srchCat(id, btn) {
  document.querySelectorAll('#srch-cats .chip').forEach(c=>c.classList.remove('on'))
  if(btn) btn.classList.add('on')
  _srchCat=id; doSearch()
}

async function doSearch() {
  const qv=q('srch-q')?.value.trim()||''
  const sort=q('srch-sort')?.value||'newest'
  const grid=q('srch-grid'), info=q('srch-info-txt'), resetBtn=q('srch-reset-btn')
  if(!grid) return
  grid.innerHTML=skelGrid(8)

  let dbq=sb.from('products').select('id,name,price,stock,created_at,product_images(image_url,sort_order),seller:users!seller_id(id,username),category:categories!category_id(id,name)').eq('is_active',true)
  if(qv) dbq=dbq.ilike('name',`%${qv}%`)
  if(_srchCat) dbq=dbq.eq('category_id',_srchCat)
  dbq = sort==='price_asc' ? dbq.order('price',{ascending:true}) :
        sort==='price_desc' ? dbq.order('price',{ascending:false}) :
        dbq.order('created_at',{ascending:sort==='oldest'})
  let list=[]
  try {
    const {data,error}=await dbq.limit(40)
    if(error) throw error
    list=data||[]
  } catch(e) {
    console.error('doSearch:',e)
    list=[]
    toast('Gagal mencari: '+e.message,'err')
  }

  if(info) info.textContent=`${list.length} produk${qv?` untuk "${qv}"`:''}${_srchCat?' (filter aktif)':''}`
  if(resetBtn) resetBtn.style.display=(qv||_srchCat)?'inline':'none'
  grid.innerHTML=productGrid(list,'Produk tidak ditemukan',true)
}

let _cartItems=[], _cartSel=[]

async function pgCart() {
  if(!ST.user){go('auth',{tab:'login',redirect:'cart'});return}
  const el=q('pg-cart')
  el.innerHTML=`<div class="wrap"><div class="ph"><div class="ph-title">Keranjang</div></div>
    <div class="cart-layout">
      <div id="cart-list"><div style="text-align:center;padding:40px;color:var(--muted)">Memuat...</div></div>
      <div id="cart-sum"></div>
    </div>
  </div>`
  await fetchCart()
  injectFooter('cart')
}

async function fetchCart() {
  try {
    const {data,error}=await sb.from('carts').select('id,quantity,product:products!product_id(id,name,price,stock,is_active,product_images(image_url,sort_order),seller:users!seller_id(id,username))').eq('user_id',ST.user.id).order('created_at',{ascending:false})
    if(error) throw error
    _cartItems=(data||[]).filter(i=>i.product?.is_active)
    _cartSel=_cartItems.map(i=>i.product.id)
  } catch(e) {
    console.error('fetchCart:',e)
    _cartItems=[]; _cartSel=[]
    toast('Gagal memuat keranjang: '+e.message,'err')
  }
  renderCart(); renderCartSum()
}

function renderCart() {
  const el=q('cart-list'); if(!el) return
  if(!_cartItems.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><h3>Keranjang kosong</h3><p>Yuk tambahkan produk!</p><button class="btn btn-gold" onclick="go('search')">Mulai Belanja</button></div>`; return
  }
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:13px;color:var(--muted)">${_cartItems.length} item</span>
    <button class="btn btn-ghost btn-sm" onclick="cartToggleAll()">${_cartSel.length===_cartItems.length?'Batal Semua':'Pilih Semua'}</button>
  </div>
  ${_cartItems.map(item=>{
    const img=firstImg(item.product),oos=item.product.stock===0,sel=_cartSel.includes(item.product.id)
    return `<div class="ci ${sel?'sel':''}" id="ci-${item.id}">
      <div class="ci-check" onclick="cartToggleSel('${item.product.id}')">
        <div class="chk ${sel?'on':''}">${sel?`<svg width="10" height="10" fill="none" stroke="#000" stroke-width="3" viewBox="0 0 24 24"><path d="m5 13 4 4L19 7"/></svg>`:''}</div>
      </div>
      <div class="ci-img" onclick="go('product',{id:'${item.product.id}'})">
        ${img?`<img src="${esc(img)}" alt=""/>`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">${NO_IMG}</div>`}
      </div>
      <div class="ci-body">
        <div class="ci-name" onclick="go('product',{id:'${item.product.id}'})">${esc(item.product.name)}</div>
        <div class="ci-seller">${esc(item.product.seller?.username||'Seller')}</div>
        ${oos?`<span style="display:inline-block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;margin-bottom:4px">Stok Habis</span>`:''}
        <div class="ci-footer">
          <div class="ci-price">${rp(item.product.price*item.quantity)}</div>
          <div class="ci-ctrls">
            ${!oos?`<div class="qty-sm">
              <button onclick="cartQty('${item.id}',${item.quantity-1},${item.product.stock})" ${item.quantity<=1?'disabled':''}>
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
              </button>
              <span>${item.quantity}</span>
              <button onclick="cartQty('${item.id}',${item.quantity+1},${item.product.stock})" ${item.quantity>=item.product.stock?'disabled':''}>
                <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              </button>
            </div>`:''}
            <div class="del-btn" onclick="cartDel('${item.id}','${item.product.id}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 4v6m4-6v6"/></svg>
            </div>
          </div>
        </div>
      </div>
    </div>`
  }).join('')}`
}

function renderCartSum() {
  const el=q('cart-sum'); if(!el) return
  const sel=_cartItems.filter(i=>_cartSel.includes(i.product.id))
  const total=sel.reduce((a,i)=>a+i.product.price*i.quantity,0)
  el.innerHTML=`<div class="sum-box">
    <h2 class="brand" style="font-size:16px;font-weight:700;margin-bottom:14px">Ringkasan</h2>
    <div class="sum-row"><span class="k">Dipilih</span><span style="font-weight:600">${_cartSel.length} produk</span></div>
    <div class="sum-total"><span class="k">Total</span><span class="v">${rp(total)}</span></div>
    <div class="note-box"><strong style="color:var(--gold)">⏱</strong> Order dibatalkan otomatis dalam 30 menit jika belum dikonfirmasi.</div>
    <button class="btn btn-gold btn-full" id="checkout-btn" onclick="cartCheckout()" ${_cartSel.length===0?'disabled':''}>
      Checkout (${_cartSel.length})
    </button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px;font-size:11px" onclick="go('search')">+ Tambah produk lain</button>
  </div>`
}

function cartToggleSel(pid) {
  _cartSel=_cartSel.includes(pid)?_cartSel.filter(x=>x!==pid):[..._cartSel,pid]
  renderCart(); renderCartSum()
}
function cartToggleAll() {
  _cartSel=_cartSel.length===_cartItems.length?[]:_cartItems.map(i=>i.product.id)
  renderCart(); renderCartSum()
}
async function cartQty(id,qty,stock) {
  if(qty<1||qty>stock) return
  await sb.from('carts').update({quantity:qty}).eq('id',id)
  const item=_cartItems.find(i=>i.id===id); if(item) item.quantity=qty
  renderCart(); renderCartSum()
}
async function cartDel(id, pid) {
  await sb.from('carts').delete().eq('id',id)
  _cartItems=_cartItems.filter(i=>i.id!==id)
  _cartSel=_cartSel.filter(x=>x!==pid)
  await refreshCartCount(); renderCart(); renderCartSum(); toast('Dihapus.')
}
async function cartCheckout() {
  if(!_cartSel.length) return
  const sel=_cartItems.filter(i=>_cartSel.includes(i.product.id))
  const oos=sel.find(i=>i.product.stock<i.quantity)
  if(oos){toast(`Stok "${oos.product.name}" tidak cukup.`,'err');return}
  const btn=q('checkout-btn')
  if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  let coError=null
  try{const {error}=await sb.rpc('create_order',{p_user_id:ST.user.id,p_items:sel.map(i=>({product_id:i.product.id,quantity:i.quantity}))});coError=error}catch(e){coError=e}
  if(coError){toast(coError.message||'Gagal checkout.','err');if(btn){btn.innerHTML=`Checkout (${_cartSel.length})`;btn.disabled=false};return}
  try{await sb.from('carts').delete().in('id',sel.map(i=>i.id))}catch(e){}
  _cartItems=[]; _cartSel=[]; ST.cartCount=0; updateCartBadge()
  toast('Order berhasil dibuat! 🎉')
  setTimeout(()=>go('tx'),1200)
}

let _txOrders=[], _txFilter='all'

function cdCountdown(exp) {
  const diff=new Date(exp)-new Date()
  if(diff<=0) return 'Kadaluarsa'
  const m=Math.floor(diff/60000), s=Math.floor((diff%60000)/1000)
  return `${m}m ${String(s).padStart(2,'0')}s`
}

function txFilter(f, btn) {

  _txFilter=f; txRender()
}

function txRender() {
  ST.cdTimers.forEach(clearInterval); ST.cdTimers=[]
  const sort=q('tx-sort')?.value||'newest'
  let list=_txOrders.filter(o=>_txFilter==='all'||o.status===_txFilter)
  list=list.sort((a,b)=>sort==='newest'?new Date(b.created_at)-new Date(a.created_at):new Date(a.created_at)-new Date(b.created_at))
  const el=q('tx-list'); if(!el) return

  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><h3>Belum ada transaksi</h3><button class="btn btn-gold" style="margin-top:12px" onclick="go('search')">Mulai Belanja</button></div>`;return}

  const SCfg={pending:{cls:'st-pending',lbl:'Menunggu'},paid:{cls:'st-paid',lbl:'Dibayar'},cancelled:{cls:'st-cancelled',lbl:'Dibatalkan'}}

  el.innerHTML=list.map(o=>{
    const cfg=SCfg[o.status]||SCfg.cancelled
    const isPend=o.status==='pending', isExp=isPend&&new Date(o.expires_at)<new Date()
    const stCls=isExp?'st-cancelled':cfg.cls, stLbl=isExp?'Kadaluarsa':cfg.lbl
    const prevs=(o.order_items||[]).slice(0,3).map(item=>{
      const img=firstImg(item.product)
      return `<div class="oc-item"><div class="oc-item-img">${img?`<img src="${esc(img)}" alt=""/>`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">${NO_IMG}</div>`}</div><div><div class="oc-item-name">${esc(item.product?.name||'')}</div><div class="oc-item-qty">×${item.quantity}</div></div></div>`
    }).join('')
    const more=(o.order_items||[]).length>3?`<span style="font-size:11px;color:var(--dim)">+${o.order_items.length-3} lainnya</span>`:''
    return `<div class="oc">
      <div class="oc-head">
        <div class="oc-id">
          <span class="oc-id-lbl">ID:</span>
          <span class="oc-id-val">${esc(o.id)}</span>
          <div class="copy-btn" id="cpb-${o.id}" onclick="txCopy('${o.id}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </div>
        </div>
        <span class="st-badge ${stCls}">${stLbl}</span>
      </div>
      <div class="oc-body">
        <div class="oc-items">${prevs}${more}</div>
        <div class="oc-foot">
          <div class="oc-meta">
            <div>${fmtDate(o.created_at)}</div>
            ${isPend&&!isExp?`<div class="oc-countdown" id="cd-${o.id}">⏱ <span></span></div>`:''}
            ${o.status==='paid'&&o.paid_at?`<div class="oc-paid-at">✓ Dibayar: ${fmtDate(o.paid_at)}</div>`:''}
          </div>
          <div class="oc-right">
            <span class="oc-total">${rp(o.total_price)}</span>
            <div style="display:flex;gap:6px">
              ${isPend&&!isExp?`<button class="btn btn-green btn-sm" id="conf-${o.id}" onclick="txConfirm('${o.id}')">✓ Konfirmasi</button>`:''}
              <button class="btn btn-ghost btn-sm" onclick="txDetail('${o.id}')">Detail</button>
            </div>
          </div>
        </div>
      </div>
    </div>`
  }).join('')

  // Start countdowns
  list.filter(o=>o.status==='pending'&&new Date(o.expires_at)>new Date()).forEach(o=>{
    const span=q(`cd-${o.id}`)?.querySelector('span'); if(!span) return
    const tick=()=>{ span.textContent=cdCountdown(o.expires_at) }
    tick(); ST.cdTimers.push(setInterval(tick,1000))
  })
}

async function txCopy(id) {
  try{await navigator.clipboard.writeText(id)}catch(e){}
  const btn=q(`cpb-${id}`); if(btn) btn.classList.add('ok')
  toast('Order ID disalin! ✅')
  setTimeout(()=>btn?.classList.remove('ok'),2000)
}

async function txConfirm(orderId) {
  const btn=q(`conf-${orderId}`)
  if(btn){btn.innerHTML=`<div class="spin spin-w"></div>`;btn.disabled=true}
  let tcError=null
  try{const {error}=await sb.rpc('confirm_order',{p_order_id:orderId});tcError=error}catch(e){tcError=e}
  if(tcError){toast(tcError.message||'Gagal konfirmasi.','err');if(btn){btn.innerHTML='✓ Konfirmasi';btn.disabled=false};return}
  const o=_txOrders.find(x=>x.id===orderId)
  if(o){o.status='paid';o.paid_at=new Date().toISOString()}
  txRender(); toast('Pembayaran dikonfirmasi! 🎉')
  if(ST.user) { try{ const {data:{session}}=await sb.auth.getSession(); if(session?.user){await loadProfile(session.user);updateNav()} }catch(e){} }
}

function pgAuth(params={}) {

    <div class="auth-tabs">
      <div class="auth-tab ${tab==='login'?'on':''}" onclick="authRender('login')">Masuk</div>
      <div class="auth-tab ${tab==='register'?'on':''}" onclick="authRender('register')">Daftar</div>
    </div>
    <div id="a-err"></div><div id="a-ok"></div><div id="a-fields"></div>`

  else authRegFields()
}

function FI(id,type='text',placeholder='',value='',extra='') {
  const t=type==='password'?(_showPass?'text':'password'):type
  return `<input id="${id}" type="${t}" placeholder="${placeholder}" value="${esc(value)}" class="fi" ${extra}/>`

function EYE() {
  return `<div class="eye-btn" onclick="authTogglePass()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${_showPass?`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`:
  `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`}</svg></div>`
}

function authLoginFields() {

  q('a-fields').innerHTML=`
    <div class="field"><label>Username</label>${FI('a-user','text','namakamu','','autocomplete="username" maxlength="30"')}</div>
    <div class="field"><label>Email</label>${FI('a-email','email','kamu@email.com','','autocomplete="email"')}</div>

function authRenderForgot() {
  q('aform').innerHTML=`
    <button style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gold);margin-bottom:20px;cursor:pointer;background:none;border:none;font-family:inherit" onclick="authRender('login')">
      ← Kembali
    </button>
    <div class="brand" style="font-size:22px;font-weight:800;margin-bottom:6px">Lupa Password?</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px">Link reset dikirim ke email kamu.</p>
    <div id="a-err"></div><div id="a-ok"></div>

    <button class="btn btn-gold btn-full" id="a-btn" onclick="authSubmitForgot()">Kirim Link Reset</button>`
}

function authTogglePass() {
  _showPass=!_showPass
  document.querySelectorAll('#aform input').forEach(inp=>{
    if(inp.id==='a-email'||inp.id==='a-user') return
    if(inp.type==='password'||inp.type==='text') inp.type=_showPass?'text':'password'
  })
  // Re-render eye buttons safely
  document.querySelectorAll('.eye-btn').forEach(b=>{
    const newEl=document.createElement('div')
    newEl.className='eye-btn'
    newEl.setAttribute('onclick','authTogglePass()')
    newEl.innerHTML=_showPass
      ? '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
    b.parentNode.replaceChild(newEl, b)
  })
}

function authStrength() {
  const p=q('a-pass')?.value||''; let s=0
  if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++
  const colors=['','#ef4444','#eab308','#3b82f6','#22c55e']
  const labels=['','Lemah','Cukup','Kuat','Sangat Kuat']
  const tclr=['','#f87171','#fbbf24','#60a5fa','#4ade80']
  document.querySelectorAll('#str-bar div').forEach((b,i)=>{ b.style.background=i<s?colors[s]:'var(--border2)' })
  const lbl=q('str-lbl'); if(lbl){lbl.textContent=p?labels[s]:''; lbl.style.color=tclr[s]}
}
function authChkConf() {
  const p=q('a-pass')?.value||'',c=q('a-conf')?.value||''
  const err=q('conf-err'); if(err) err.textContent=c&&c!==p?'Password tidak cocok':''
}

function authErr(msg) { const e=q('a-err'); if(e) e.innerHTML=`<div class="err-box"><p>${esc(msg)}</p></div>` }
function authOk(msg)  { const e=q('a-ok');  if(e) e.innerHTML=`<div class="ok-box"><p>${esc(msg)}</p></div>` }
function authClear()  { const e=q('a-err'),o=q('a-ok'); if(e)e.innerHTML=''; if(o)o.innerHTML='' }

async function authSubmit() {
  authClear()
  const btn=q('a-btn')
  if(_authTab==='login') {
    const email=q('a-email')?.value.trim(), pass=q('a-pass')?.value
    if(!email||!pass){authErr('Email dan password wajib diisi.');return}
    if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass})
    if(error) {
      const msg=error.message.toLowerCase()
      if(msg.includes('email not confirmed')||msg.includes('not confirmed')) {
        q('a-err').innerHTML=`<div class="err-box"><p>Email belum diverifikasi.</p><button class="rl" onclick="authResend('${esc(email)}')">Kirim ulang verifikasi →</button></div>`
      } else if(msg.includes('invalid login')||msg.includes('invalid credentials')) {
        authErr('Email atau password salah.')
      } else authErr(error.message)
      if(btn){btn.innerHTML='Masuk';btn.disabled=false}; return
    }
    if(!data.user?.email_confirmed_at) {
      await sb.auth.signOut()
      q('a-err').innerHTML=`<div class="err-box"><p>Email belum diverifikasi.</p><button class="rl" onclick="authResend('${esc(email)}')">Kirim ulang →</button></div>`
      if(btn){btn.innerHTML='Masuk';btn.disabled=false}; return
    }
    await loadProfile(data.user); updateNav()
    toast('Selamat datang! 👋')
    go(_authRedirect||'home'); _authRedirect=null

  } else {
    const username=q('a-user')?.value.trim(), email=q('a-email')?.value.trim()
    const pass=q('a-pass')?.value, conf=q('a-conf')?.value
    if(!username||username.length<3){authErr('Username minimal 3 karakter.');return}
    if(!email){authErr('Email wajib diisi.');return}
    if(!pass||pass.length<8){authErr('Password minimal 8 karakter.');return}
    if(pass!==conf){authErr('Konfirmasi password tidak cocok.');return}
    if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
    const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{username}}})
    if(error){authErr(error.message.includes('already registered')?'Email sudah terdaftar.':error.message);if(btn){btn.innerHTML='Buat Akun';btn.disabled=false};return}
    if(data.user) await sb.from('users').update({username}).eq('id',data.user.id).catch(()=>{})
    authOk('Registrasi berhasil! 🎉 Cek email kamu untuk konfirmasi akun.')
    const af=q('a-fields'); if(af) af.innerHTML=`<button class="btn btn-gold btn-full" onclick="authRender('login')">Ke Halaman Masuk</button>`
  }
}

async function authResend(email) {
  const {error}=await sb.auth.resend({type:'signup',email})
  if(error) authErr(error.message)
  else authOk('Email verifikasi dikirim ulang!')
}

async function authSubmitForgot() {
  authClear()
  const email=q('a-email')?.value.trim()
  if(!email){authErr('Masukkan email kamu.');return}
  const btn=q('a-btn'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:`${location.origin}/marketplace.id/`})
  if(error){authErr(error.message);if(btn){btn.innerHTML='Kirim Link Reset';btn.disabled=false};return}
  authOk('Link reset dikirim ke email kamu!')
  if(btn) btn.style.display='none'
}

async function profileUploadAva(input) {
  const file=input.files[0]; if(!file) return
  if(file.size>5*1024*1024){toast('Maks 5MB','err');return}
  const st=q('ava-status'), av=q('prof-ava')
  if(st) st.innerHTML=`<div class="spin spin-w" style="width:14px;height:14px"></div>`
  try {
    const url=await uploadCDN(file)
    q('p-ava').value=url
    if(av) av.innerHTML=`<img src="${url}" alt="" style="width:100%;height:100%;object-fit:cover"/>`
    if(st) st.innerHTML=`<span style="color:var(--green)">✓</span>`
    toast('Foto diupload! ✅')
  } catch(e) {
    if(st) st.innerHTML=`<span style="color:var(--red)">✗</span>`
    toast('Gagal upload: '+e.message,'err')
  }
}

async function profileSave() {
  const username=q('p-user')?.value.trim(), ava=q('p-ava')?.value.trim()
  const errEl=q('prof-err'), okEl=q('prof-ok')
  if(errEl)errEl.innerHTML=''; if(okEl)okEl.innerHTML=''
  if(!username){if(errEl)errEl.innerHTML=`<div class="err-box"><p>Username tidak boleh kosong.</p></div>`;return}
  const btn=q('p-save'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  const {error}=await sb.from('users').update({username,avatar_url:ava||null}).eq('id',ST.user.id)
  if(error){if(errEl)errEl.innerHTML=`<div class="err-box"><p>${esc(error.message)}</p></div>`}
  else {
    toast('Profil diperbarui! ✅')
    const {data:{session}}=await sb.auth.getSession()
    if(session?.user){await loadProfile(session.user);updateNav()}
    if(okEl)okEl.innerHTML=`<div class="ok-box"><p>Profil berhasil diperbarui!</p></div>`
  }
  if(btn){btn.innerHTML='Simpan Perubahan';btn.disabled=false}
}

async function depLoadHist() {
  let data=[]
  try { const res=await sb.from('deposits').select('*').eq('user_id',ST.user.id).order('created_at',{ascending:false}).limit(10); data=res.data||[] } catch(e) { console.warn('deposits:',e.message); return }
  const hist=data, el=q('dep-hist'); if(!hist.length||!el) return
  const sColor={pending:'var(--yellow)',approved:'var(--green)',rejected:'var(--red)'}
  el.innerHTML=`<div class="card card-p" style="margin-top:14px">
    <div class="brand" style="font-size:15px;font-weight:700;margin-bottom:14px">Riwayat Deposit</div>
    ${hist.map(d=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #0e0e0e;font-size:13px">

      </div>
      <span style="font-size:11px;font-weight:800;text-transform:uppercase;color:${sColor[d.status]||'var(--dim)'}">${d.status}</span>
    </div>`).join('')}
  </div>`
}

async function depSubmit() {
  const errEl=q('dep-err'), okEl=q('dep-ok')
  if(errEl)errEl.innerHTML=''; if(okEl)okEl.innerHTML=''
  const amount=parseInt(q('dep-amt')?.value||'0',10)
  if(!amount||amount<10000){if(errEl)errEl.innerHTML=`<div class="err-box"><p>Minimal deposit Rp 10.000</p></div>`;return}
  const method=q('dep-method')?.value||'Transfer Bank'
  const btn=q('dep-btn'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  let error=null
  try { const res=await sb.from('deposits').insert({user_id:ST.user.id,amount,method,status:'pending'}); error=res.error } catch(e) { error=e }
  if(error){if(errEl)errEl.innerHTML=`<div class="err-box"><p>${esc(error.message)}</p></div>`}
  else {
    if(okEl)okEl.innerHTML=`<div class="ok-box"><p>Request deposit dikirim! Tunggu konfirmasi admin.</p></div>`
    q('dep-amt').value=''; toast('Request dikirim!'); depLoadHist()
  }
  if(btn){btn.innerHTML='Request Deposit';btn.disabled=false}
}

function updateSteps(step) {
  for(let i=0;i<4;i++){
    const c=q(`sc${i}`),l=q(`sl${i}`),ln=q(`sln${i}`)
    if(!c)continue
    if(i<step){c.style.cssText='width:28px;height:28px;border-radius:50%;background:var(--green);border:2px solid var(--green);color:#000;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .3s';c.textContent='✓';if(l)l.style.color='var(--green)'}
    else if(i===step){c.style.cssText='width:28px;height:28px;border-radius:50%;background:var(--gold);border:2px solid var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .3s';c.textContent=i+1;if(l)l.style.color='var(--gold)'}
    else{c.style.cssText='width:28px;height:28px;border-radius:50%;background:#1a1a1a;border:2px solid #252525;color:#444;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .3s';c.textContent=i+1;if(l)l.style.color='#444'}
    if(ln) ln.style.background=i<step?'var(--green)':'#1a1a1a'
  }
}

function chgPulau(v) {
  SD.pulau=v; SD.prov=''; SD.kab=''; SD.kec=''

  const ks=q('s-kb'); if(ks) ks.innerHTML=`<option value="">Pilih Kab/Kota...</option>`
  const kcs=q('s-kc'); if(kcs) kcs.innerHTML=`<option value="">Pilih Kecamatan...</option>`
}
function chgProv(v) {
  SD.prov=v; SD.kab=''; SD.kec=''
  const ks=q('s-kb'); if(ks) ks.innerHTML=`<option value="">Pilih Kab/Kota...</option>${getKab(v).map(k=>`<option value="${k}">${k}</option>`).join('')}`

function chgKab(v) {
  SD.kab=v; SD.kec=''

}

async function sellerUploadKTP(input) {
  const file=input.files[0]; if(!file) return
  if(file.size>5*1024*1024){toast('Maks 5MB','err');return}
  const st=q('ktp-st'), area=q('ktp-area')
  if(st) st.innerHTML=`<div class="spin spin-w" style="width:12px;height:12px;display:inline-block"></div> Mengupload...`
  try {
    const url=await uploadCDN(file)
    SD.ktp_url=url
    if(area){area.style.borderColor='var(--green)';area.innerHTML=`<div style="color:var(--green);font-size:13px;font-weight:600">✓ Foto KTP terupload<br><span style="font-size:10px;color:#555;font-weight:400">Klik untuk ganti</span></div>`}
    if(st) st.innerHTML=''
    toast('KTP berhasil diupload! ✅')
  } catch(e) {
    if(st) st.innerHTML=`<span style="color:var(--red)">Gagal: ${esc(e.message)}</span>`
    toast('Gagal upload: '+e.message,'err')
  }
}

function sellerErr(msg) { const e=q('s-err'); if(e){e.innerHTML=`<div class="err-box"><p>${msg}</p></div>`;e.scrollIntoView({behavior:'smooth',block:'center'})} }
function sellerClearErr() { const e=q('s-err'); if(e) e.innerHTML='' }

function sellerNext(step) {
  sellerClearErr()
  if(step===0) {
    const nm=q('s-nm')?.value.trim(), ds=q('s-ds')?.value.trim(), ct=q('s-ct')?.value, wa=q('s-wa')?.value.trim()
    if(!nm||nm.length<3) return sellerErr('Nama toko minimal 3 karakter.')
    if(!ds||ds.length<20) return sellerErr('Deskripsi minimal 20 karakter.')
    if(!ct) return sellerErr('Pilih kategori toko.')
    if(!wa||wa.length<9) return sellerErr('Nomor WhatsApp tidak valid.')
    Object.assign(SD,{shop_name:nm,shop_desc:ds,cat:ct,wa})
    sellerStep(1)
  } else if(step===1) {
    const fn=q('s-fn')?.value.trim(), nik=q('s-nik')?.value.trim(), dob=q('s-dob')?.value, gen=q('s-gen')?.value, bk=q('s-bk')?.value.trim()
    if(!fn||fn.length<3) return sellerErr('Nama lengkap wajib diisi.')
    if(!nik||nik.length!==16) return sellerErr('NIK harus 16 digit.')
    if(!dob) return sellerErr('Tanggal lahir wajib diisi.')
    if(!gen) return sellerErr('Jenis kelamin wajib dipilih.')
    if(!SD.ktp_url) return sellerErr('Foto KTP wajib diupload.')
    if(!bk||bk.length<10) return sellerErr('Info rekening bank wajib diisi.')
    Object.assign(SD,{fullname:fn,nik,dob,gender:gen,bank:bk})
    sellerStep(2)
  } else if(step===2) {
    const pu=q('s-pu')?.value, pr=q('s-pr')?.value, kb=q('s-kb')?.value, kc=q('s-kc')?.value, kel=q('s-kel')?.value.trim(), kp=q('s-kp')?.value.trim(), al=q('s-al')?.value.trim()
    if(!pu) return sellerErr('Pilih pulau.')
    if(!pr) return sellerErr('Pilih provinsi.')
    if(!kb) return sellerErr('Pilih kabupaten/kota.')
    if(!kc) return sellerErr('Pilih kecamatan.')
    if(!kel) return sellerErr('Kelurahan/desa wajib diisi.')
    if(!kp||kp.length!==5) return sellerErr('Kode pos harus 5 digit.')
    if(!al||al.length<10) return sellerErr('Alamat lengkap wajib diisi.')
    Object.assign(SD,{prov:pr,kab:kb,kec:kc,kel,kodepos:kp,alamat:al})
    sellerStep(3)
  }
}

function otpIn(i, el) {
  el.value=el.value.replace(/[^0-9]/g,'')
  if(el.value&&i<5) q(`otp${i+1}`)?.focus()
}
function otpKD(i, e) {
  if(e.key==='Backspace'&&!e.target.value&&i>0) q(`otp${i-1}`)?.focus()
  if(e.key==='ArrowLeft'&&i>0) q(`otp${i-1}`)?.focus()
  if(e.key==='ArrowRight'&&i<5) q(`otp${i+1}`)?.focus()
}

async function sellerSendOTP() {
  if(!q('s-agree')?.checked){toast('Centang persetujuan dahulu.','err');return}
  const btn=q('send-otp-btn'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  const otp=String(Math.floor(100000+Math.random()*900000))
  const exp=new Date(Date.now()+10*60*1000).toISOString()
  let sendError=null
  try{const {error}=await sb.from('seller_otps').upsert({user_id:ST.user.id,otp_code:otp,expires_at:exp},{onConflict:'user_id'});sendError=error}catch(e){sendError=e}
  if(sendError){toast('Gagal: '+sendError.message+' — Pastikan tabel seller_otps dibuat di Supabase.','err');if(btn){btn.innerHTML='Kirim Kode Verifikasi ke Email';btn.disabled=false};return}
  console.warn('🔑 DEV OTP (hapus di produksi):', otp) // HAPUS DI PRODUKSI
  toast(`Kode OTP dikirim ke ${ST.user.email}`)
  const send=q('otp-send'), inp=q('otp-input')
  if(send) send.style.display='none'
  if(inp) inp.style.display='block'
  q('otp0')?.focus()
  let sec=60; clearInterval(window._otpCd)
  window._otpCd=setInterval(()=>{
    sec--; const t=q('cd-s'); if(t) t.textContent=sec
    if(sec<=0){clearInterval(window._otpCd);const w=q('cd-wrap'),rb=q('resend-btn');if(w)w.style.display='none';if(rb)rb.style.display='inline'}
  },1000)
}

async function sellerVerify() {
  const code=Array.from({length:6}).map((_,i)=>q(`otp${i}`)?.value||'').join('')
  if(code.length!==6){toast('Masukkan 6 digit kode OTP.','err');return}
  const btn=q('verify-btn'); if(btn){btn.innerHTML=`<div class="spin"></div>`;btn.disabled=true}
  let od=null
  try{const {data,error}=await sb.from('seller_otps').select('otp_code,expires_at').eq('user_id',ST.user.id).single();if(!error)od=data}catch(e){}
  if(!od){toast('Kode tidak valid atau kadaluarsa. Kirim ulang kode.','err');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return}
  if(od.otp_code!==code){
    Array.from({length:6}).forEach((_,i)=>{const el=q(`otp${i}`);if(el)el.style.borderColor='var(--red)'})
    toast('Kode OTP salah.','err');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return
  }
  if(new Date(od.expires_at)<new Date()){toast('Kode kadaluarsa.','err');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return}

  let appError=null
  try{const {error}=await sb.from('seller_applications').insert({
    user_id:ST.user.id, email:ST.user.email,
    shop_name:SD.shop_name, shop_description:SD.shop_desc, shop_category:SD.cat, shop_whatsapp:'+62'+SD.wa,
    full_name:SD.fullname, nik:SD.nik, date_of_birth:SD.dob, gender:SD.gender, ktp_url:SD.ktp_url, bank_account:SD.bank,
    pulau:SD.pulau, provinsi:SD.prov, kab_kota:SD.kab, kecamatan:SD.kec, kelurahan:SD.kel, kode_pos:SD.kodepos, alamat_lengkap:SD.alamat,
    status:'pending'
  });appError=error}catch(e){appError=e}
  if(appError){toast('Gagal submit: '+appError.message,'err');if(btn){btn.innerHTML='Verifikasi & Daftar Seller ✦';btn.disabled=false};return}
  await sb.from('seller_otps').delete().eq('user_id',ST.user.id)
  clearInterval(window._otpCd)
  updateSteps(4)
  const sf=q('s-form')
  if(sf) sf.innerHTML=`<div style="text-align:center;padding:48px 20px">
    <div style="width:70px;height:70px;background:rgba(34,197,94,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;border:2px solid rgba(34,197,94,.3);font-size:28px">✅</div>
    <div class="brand" style="font-size:22px;font-weight:800;margin-bottom:10px">Pendaftaran Terkirim! 🎉</div>
    <p style="font-size:13px;color:#666;line-height:1.7;margin-bottom:8px;max-width:340px;margin-left:auto;margin-right:auto">Admin akan meninjau dalam <strong style="color:#fff">1-3 hari kerja</strong>.</p>
    <p style="font-size:12px;color:#555;margin-bottom:24px">Notifikasi dikirim ke <strong style="color:var(--gold)">${esc(ST.user.email)}</strong></p>
    <button class="btn btn-gold" onclick="go('profile')">Kembali ke Profil</button>
  </div>`
  toast('Pendaftaran berhasil dikirim! ✅')
}

        <div style="background:#111;border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:12px;color:#888">🕐 Senin–Sabtu 08.00–22.00 WIB</div>
      </div>
    </div>
  </div>`
  injectFooter('about')
}

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('error', e=>{ console.error('App error:',e.error) })
window.addEventListener('unhandledrejection', e=>{
  console.error('Unhandled:',e.reason)
  if(e.reason?.message?.toLowerCase().includes('failed to fetch')){toast('Koneksi bermasalah. Cek internet.','err');e.preventDefault()}
})

;(async()=>{
  try {
    // Init auth
    const {data:{session}}=await sb.auth.getSession()
    if(session?.user) await loadProfile(session.user)
    updateNav()

    // Handle email confirmation hash
    if(location.hash.includes('access_token')||location.hash.includes('type=signup')) {
      await new Promise(r=>setTimeout(r,600))
      const {data:{session:s2}}=await sb.auth.getSession()
      if(s2?.user){await loadProfile(s2.user);updateNav();toast('Email berhasil dikonfirmasi! ✅')}
      history.replaceState(null,'',location.pathname)
    }

    // Auth listener
    sb.auth.onAuthStateChange(async(ev,session)=>{
      if(ev==='SIGNED_IN'||ev==='TOKEN_REFRESHED') {
        if(session?.user){await loadProfile(session.user);updateNav();startCartRT()}
        if(ST.page==='auth') go(_authRedirect||'home'), _authRedirect=null
      } else if(ev==='USER_UPDATED') {
        if(session?.user){await loadProfile(session.user);updateNav()}
      } else if(ev==='SIGNED_OUT') {
        ST.user=null;ST.cartCount=0;updateNav()
        if(window._cartCh){sb.removeChannel(window._cartCh);window._cartCh=null}
        if(['cart','tx','profile','deposit','seller'].includes(ST.page)) go('home')
      }
    })

    // Start realtime cart
    if(ST.user) startCartRT()

    // Render home
    pgHome()
  } catch(err) {
    console.error('Init error:',err)
    pgHome()
  }
})()

function startCartRT() {
  if(window._cartCh) { try{sb.removeChannel(window._cartCh)}catch(e){} }
  if(!ST.user) return
  window._cartCh=sb.channel(`cart-rt-${ST.user.id}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'carts',filter:`user_id=eq.${ST.user.id}`},async()=>await refreshCartCount())
    .subscribe()
}
</script>
